# Canonical LRA predicate registry.
# Governed by docs/governance/predicate-standards.md.

predicates:
  - id: pred:within
    name: Within
    kind: predicate
    category: topology
    arguments:
      - name: x
        role: point
      - name: W
        role: local_region
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - within
      - lies within
      - belongs to a local region
    description: >
      The point x lies within the local region W in the ambient object X.
      The local region may be a tolerance ball, punctured ball, neighborhood,
      punctured neighborhood, or another named localizing object.

  - id: pred:is-ball
    name: IsBall
    kind: predicate
    category: topology
    arguments:
      - name: B
        role: ball
      - name: c
        role: center
      - name: r
        role: radius
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is a ball
      - metric ball
      - open ball
    description: >
      The object B is the ball centered at c with radius r in the ambient
      space X.

  - id: pred:is-punctured-ball
    name: IsPuncturedBall
    kind: predicate
    category: topology
    arguments:
      - name: B_dot
        role: punctured_ball
        surface: 'B^\times'
      - name: B
        role: underlying_ball
      - name: c
        role: center
      - name: r
        role: radius
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is a punctured ball
      - is a deleted ball
    description: >
      The object B_dot is the ball B centered at c with radius r in X after
      removing the center c.

  - id: pred:is-neighborhood
    name: IsNeighborhood
    kind: predicate
    category: topology
    arguments:
      - name: U
        role: neighborhood
      - name: c
        role: center
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is a neighborhood
      - is a neighbourhood
    description: >
      The object U is a neighborhood of c in the ambient topological space X.

  - id: pred:is-punctured-neighborhood
    name: IsPuncturedNeighborhood
    kind: predicate
    category: topology
    arguments:
      - name: U_dot
        role: punctured_neighborhood
        surface: 'U^\times'
      - name: U
        role: underlying_neighborhood
      - name: c
        role: center
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is a punctured neighborhood
      - is a punctured neighbourhood
      - is a deleted neighborhood
      - is a deleted neighbourhood
    description: >
      The object U_dot is the neighborhood U of c in X after removing the
      center c.

  - id: pred:is-interval
    name: IsInterval
    kind: predicate
    category: topology
    arguments:
      - name: I
        role: interval
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is an interval
      - interval
    description: >
      The object I is an interval in the ambient ordered or topological space
      X.

  - id: pred:is-open-interval
    name: IsOpenInterval
    kind: predicate
    category: topology
    arguments:
      - name: I
        role: interval
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is an open interval
      - open interval
    description: >
      The object I is an interval in X whose finite endpoints are excluded.

  - id: pred:is-closed-interval
    name: IsClosedInterval
    kind: predicate
    category: topology
    arguments:
      - name: I
        role: interval
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is a closed interval
      - closed interval
    description: >
      The object I is an interval in X whose finite endpoints are included.

  - id: pred:is-bounded-interval
    name: IsBoundedInterval
    kind: predicate
    category: topology
    arguments:
      - name: I
        role: interval
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is a bounded interval
      - bounded interval
    description: >
      The object I is an interval in X with finite left and right endpoints.

  - id: pred:converges-to
    name: ConvergesTo
    kind: predicate
    category: sequence
    arguments:
      - name: x
        role: sequence
      - name: L
        role: limit
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - converges to
      - tends to a limit
    description: >
      The sequence or indexed object x converges to L in the ambient object X.

  - id: pred:is-cauchy
    name: IsCauchy
    kind: predicate
    category: sequence
    arguments:
      - name: x
        role: sequence
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is cauchy
      - cauchy condition
    description: >
      The sequence or indexed object x satisfies the Cauchy condition in X.

  - id: pred:is-null
    name: IsNull
    kind: predicate
    category: sequence
    arguments:
      - name: x
        role: sequence_or_object
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is null
      - null sequence
      - converges to zero
    description: >
      The object x is null in X, typically meaning it converges to the zero
      object of X.

  - id: pred:is-constant
    name: IsConstant
    kind: predicate
    category: function
    arguments:
      - name: x
        role: object
      - name: c
        role: constant_value
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is constant
      - constant object
      - constant sequence
      - constant function
    description: >
      The object x has constant value c in the ambient object X.

  - id: pred:is-ultimately-constant
    name: IsUltimatelyConstant
    kind: predicate
    category: sequence
    arguments:
      - name: x
        role: sequence
      - name: c
        role: eventual_value
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is ultimately constant
      - eventually constant
    description: >
      The sequence x is eventually equal to the value c in X.

  - id: pred:is-subsequence
    name: IsSubsequence
    kind: predicate
    category: sequence
    arguments:
      - name: y
        role: subsequence
      - name: x
        role: sequence
    returns: truth_value
    surface_forms:
      - is a subsequence
      - subsequence
    description: >
      The sequence y is obtained from x by a strictly increasing index map.

  - id: pred:has-convergent-subsequence
    name: HasConvergentSubsequence
    kind: predicate
    category: sequence
    arguments:
      - name: x
        role: sequence
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - has a convergent subsequence
    description: >
      Some subsequence of x converges in the ambient object X.

  - id: pred:is-divergent
    name: IsDivergent
    kind: predicate
    category: sequence
    arguments:
      - name: x
        role: sequence_or_object
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is divergent
      - diverges
    description: >
      The object x fails to converge in the ambient object X.

  - id: pred:diverges-to-positive-infinity
    name: DivergesToPositiveInfinity
    kind: predicate
    category: sequence
    arguments:
      - name: x
        role: sequence_or_function
      - name: P
        role: ambient_ordered_structure
    returns: truth_value
    ambient_argument: P
    polymorphic: true
    surface_forms:
      - diverges to positive infinity
      - tends to positive infinity
    description: >
      The object x eventually exceeds every bound in the ambient ordered
      structure P.

  - id: pred:diverges-to-negative-infinity
    name: DivergesToNegativeInfinity
    kind: predicate
    category: sequence
    arguments:
      - name: x
        role: sequence_or_function
      - name: P
        role: ambient_ordered_structure
    returns: truth_value
    ambient_argument: P
    polymorphic: true
    surface_forms:
      - diverges to negative infinity
      - tends to negative infinity
    description: >
      The object x eventually lies below every bound in the ambient ordered
      structure P.

  - id: pred:is-oscillatory
    name: IsOscillatory
    kind: predicate
    category: sequence
    arguments:
      - name: x
        role: sequence_or_function
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is oscillatory
      - oscillatory behavior
    description: >
      The object x exhibits oscillatory behavior in the ambient object X.

  - id: pred:limsup
    name: Limsup
    kind: predicate
    category: analysis
    arguments:
      - name: L
        role: limit_superior
      - name: x
        role: object
      - name: A
        role: ambient
    returns: truth_value
    ambient_argument: A
    polymorphic: true
    surface_forms:
      - limsup
      - limit superior
    description: >
      The object L is the limit superior of x in the ambient object A.

  - id: pred:liminf
    name: Liminf
    kind: predicate
    category: analysis
    arguments:
      - name: L
        role: limit_inferior
      - name: x
        role: object
      - name: A
        role: ambient
    returns: truth_value
    ambient_argument: A
    polymorphic: true
    surface_forms:
      - liminf
      - limit inferior
    description: >
      The object L is the limit inferior of x in the ambient object A.

  - id: pred:is-cluster-value
    name: IsClusterValue
    kind: predicate
    category: analysis
    arguments:
      - name: L
        role: cluster_value
      - name: x
        role: object
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is a cluster value
      - cluster value
    description: >
      The value L occurs as a cluster value of x in X.

  - id: pred:eventually
    name: Eventually
    kind: predicate
    category: analysis
    arguments:
      - name: phi
        role: property
        surface: '\varphi'
      - name: I
        role: index_or_filter
    returns: truth_value
    polymorphic: true
    surface_forms:
      - eventually
      - eventually true
    description: >
      The property phi holds eventually along the index or filter I.

  - id: pred:frequently
    name: Frequently
    kind: predicate
    category: analysis
    arguments:
      - name: phi
        role: property
        surface: '\varphi'
      - name: I
        role: index_or_filter
    returns: truth_value
    polymorphic: true
    surface_forms:
      - frequently
      - infinitely often
    description: >
      The property phi holds frequently along the index or filter I.

  - id: pred:eventually-equal
    name: EventuallyEqual
    kind: predicate
    category: analysis
    arguments:
      - name: x
        role: left_object
      - name: y
        role: right_object
      - name: I
        role: index_or_filter
    returns: truth_value
    polymorphic: true
    surface_forms:
      - eventually equal
      - equal eventually
    description: >
      The objects x and y agree eventually along the index or filter I.

  - id: pred:is-open
    name: IsOpen
    kind: predicate
    category: topology
    arguments:
      - name: U
        role: subset
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is open
      - open set
    description: >
      The subset U is open in the ambient topological object X.

  - id: pred:is-closed
    name: IsClosed
    kind: predicate
    category: topology
    arguments:
      - name: C
        role: subset
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is closed
      - closed set
    description: >
      The subset C is closed in the ambient topological object X.

  - id: pred:is-compact
    name: IsCompact
    kind: predicate
    category: topology
    arguments:
      - name: K
        role: subset
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is compact
      - compact set
    description: >
      The subset K is compact in the ambient topological object X.

  - id: pred:is-interior
    name: IsInterior
    kind: predicate
    category: topology
    arguments:
      - name: x
        role: point
      - name: A
        role: subset
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is interior
      - interior point
    description: >
      The point x lies in the interior of A relative to X.

  - id: pred:is-on-boundary
    name: IsOnBoundary
    kind: predicate
    category: topology
    arguments:
      - name: x
        role: point
      - name: A
        role: subset
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is on boundary
      - boundary point
    description: >
      The point x lies on the boundary of A relative to X.

  - id: pred:is-cluster
    name: IsCluster
    kind: predicate
    category: topology
    arguments:
      - name: x
        role: point
      - name: A
        role: subset
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is cluster
      - cluster point
      - accumulation point
    description: >
      The point x is a cluster point of A relative to X.

  - id: pred:is-adherent
    name: IsAdherent
    kind: predicate
    category: topology
    arguments:
      - name: x
        role: point
      - name: A
        role: subset
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is adherent
      - adherent point
      - closure point
    description: >
      The point x is adherent to A relative to X.

  - id: pred:is-isolated
    name: IsIsolated
    kind: predicate
    category: topology
    arguments:
      - name: x
        role: point
      - name: A
        role: subset
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is isolated
      - isolated point
    description: >
      The point x is isolated in A relative to X.

  - id: pred:is-dense
    name: IsDense
    kind: predicate
    category: topology
    arguments:
      - name: A
        role: subset
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is dense
      - dense subset
    description: >
      The subset A is dense in the ambient topological object X.

  - id: pred:is-sequentially-compact
    name: IsSequentiallyCompact
    kind: predicate
    category: topology
    arguments:
      - name: K
        role: subset
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is sequentially compact
      - sequentially compact
    description: >
      The subset K is sequentially compact in the ambient topological object X.

  - id: pred:tends-to
    name: TendsTo
    kind: predicate
    category: analysis
    arguments:
      - name: f
        role: function_or_object
      - name: a
        role: source_point
      - name: L
        role: target_limit
      - name: X
        role: source_ambient
      - name: Y
        role: target_ambient
    returns: truth_value
    ambient_argument: Y
    polymorphic: true
    surface_forms:
      - tends to
      - function limit
    description: >
      The object f tends to L as its input tends to a from the source ambient
      object X, with values in Y.

  - id: pred:left-limit
    name: LeftLimit
    kind: predicate
    category: analysis
    arguments:
      - name: L
        role: limit
      - name: f
        role: function
      - name: a
        role: source_point
      - name: X
        role: source_ambient
      - name: Y
        role: target_ambient
    returns: truth_value
    ambient_argument: Y
    polymorphic: true
    surface_forms:
      - left limit
      - left-hand limit
    description: >
      The left-hand limit of f at a is L, with source ambient X and target
      ambient Y.

  - id: pred:right-limit
    name: RightLimit
    kind: predicate
    category: analysis
    arguments:
      - name: L
        role: limit
      - name: f
        role: function
      - name: a
        role: source_point
      - name: X
        role: source_ambient
      - name: Y
        role: target_ambient
    returns: truth_value
    ambient_argument: Y
    polymorphic: true
    surface_forms:
      - right limit
      - right-hand limit
    description: >
      The right-hand limit of f at a is L, with source ambient X and target
      ambient Y.

  - id: pred:limit-at-infinity
    name: LimitAtInfinity
    kind: predicate
    category: analysis
    arguments:
      - name: L
        role: limit
      - name: f
        role: function
      - name: Y
        role: target_ambient
    returns: truth_value
    ambient_argument: Y
    polymorphic: true
    surface_forms:
      - limit at infinity
      - tends at infinity
    description: >
      The function f tends to L along an unbounded direction, with values in
      the target ambient object Y.

  - id: pred:is-continuous
    name: IsContinuous
    kind: predicate
    category: analysis
    arguments:
      - name: f
        role: function
      - name: Locus
        role: locus
      - name: X
        role: source_ambient
      - name: Y
        role: target_ambient
    returns: truth_value
    ambient_argument: Y
    polymorphic: true
    surface_forms:
      - is continuous
      - continuous
    description: >
      The function f is continuous on the indicated locus, with source ambient
      X and target ambient Y. The locus may be a point, set, interval, local
      region, or the whole source ambient object.

  - id: pred:is-uniformly-continuous
    name: IsUniformlyContinuous
    kind: predicate
    category: analysis
    arguments:
      - name: f
        role: function
      - name: Locus
        role: locus
      - name: X
        role: source_ambient
      - name: Y
        role: target_ambient
    returns: truth_value
    ambient_argument: Y
    polymorphic: true
    surface_forms:
      - is uniformly continuous
      - uniformly continuous
    description: >
      The function f is uniformly continuous on the indicated locus, with
      source ambient X and target ambient Y.

  - id: pred:is-lipschitz
    name: IsLipschitz
    kind: predicate
    category: analysis
    arguments:
      - name: f
        role: function
      - name: Locus
        role: locus
      - name: X
        role: source_ambient
      - name: Y
        role: target_ambient
      - name: C
        role: lipschitz_constant
    returns: truth_value
    ambient_argument: Y
    polymorphic: true
    surface_forms:
      - is lipschitz
      - lipschitz
    description: >
      The function f satisfies a Lipschitz condition with constant C on the
      indicated locus.

  - id: pred:is-bi-lipschitz
    name: IsBiLipschitz
    kind: predicate
    category: analysis
    arguments:
      - name: f
        role: function
      - name: Locus
        role: locus
      - name: X
        role: source_ambient
      - name: Y
        role: target_ambient
      - name: c
        role: lower_lipschitz_constant
      - name: C
        role: upper_lipschitz_constant
    returns: truth_value
    ambient_argument: Y
    polymorphic: true
    surface_forms:
      - is bi-lipschitz
      - bi-lipschitz
    description: >
      The function f satisfies two-sided Lipschitz bounds with constants c and
      C on the indicated locus.

  - id: pred:is-discontinuous
    name: IsDiscontinuous
    kind: predicate
    category: analysis
    arguments:
      - name: f
        role: function
      - name: Locus
        role: locus
      - name: X
        role: source_ambient
      - name: Y
        role: target_ambient
    returns: truth_value
    ambient_argument: Y
    polymorphic: true
    surface_forms:
      - is discontinuous
      - discontinuous
    description: >
      The function f is discontinuous on the indicated locus.

  - id: pred:is-removable-discontinuity
    name: IsRemovableDiscontinuity
    kind: predicate
    category: analysis
    arguments:
      - name: f
        role: function
      - name: Locus
        role: locus
      - name: X
        role: source_ambient
      - name: Y
        role: target_ambient
    returns: truth_value
    ambient_argument: Y
    polymorphic: true
    surface_forms:
      - removable discontinuity
      - is a removable discontinuity
    description: >
      The function f has a removable discontinuity at or on the indicated
      locus.

  - id: pred:is-jump-discontinuity
    name: IsJumpDiscontinuity
    kind: predicate
    category: analysis
    arguments:
      - name: f
        role: function
      - name: Locus
        role: locus
      - name: X
        role: source_ambient
      - name: Y
        role: target_ambient
    returns: truth_value
    ambient_argument: Y
    polymorphic: true
    surface_forms:
      - jump discontinuity
      - is a jump discontinuity
    description: >
      The function f has a jump discontinuity at or on the indicated locus.

  - id: pred:is-essential-discontinuity
    name: IsEssentialDiscontinuity
    kind: predicate
    category: analysis
    arguments:
      - name: f
        role: function
      - name: Locus
        role: locus
      - name: X
        role: source_ambient
      - name: Y
        role: target_ambient
    returns: truth_value
    ambient_argument: Y
    polymorphic: true
    surface_forms:
      - essential discontinuity
      - is an essential discontinuity
    description: >
      The function f has an essential discontinuity at or on the indicated
      locus.

  - id: pred:oscillation
    name: Oscillation
    kind: predicate
    category: analysis
    arguments:
      - name: omega
        role: oscillation_value
        surface: '\omega'
      - name: f
        role: function
      - name: Locus
        role: locus
      - name: X
        role: source_ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - oscillation
      - oscillation on a locus
    description: >
      The value omega is the oscillation of f on the indicated locus in X.

  - id: pred:is-convex
    name: IsConvex
    kind: predicate
    category: analysis
    arguments:
      - name: f
        role: function_or_set
      - name: Locus
        role: locus
    returns: truth_value
    polymorphic: true
    surface_forms:
      - is convex
      - convex
    description: >
      The object f is convex on the indicated locus.

  - id: pred:is-concave
    name: IsConcave
    kind: predicate
    category: analysis
    arguments:
      - name: f
        role: function_or_set
      - name: Locus
        role: locus
    returns: truth_value
    polymorphic: true
    surface_forms:
      - is concave
      - concave
    description: >
      The object f is concave on the indicated locus.

  - id: pred:derivative
    name: Derivative
    kind: predicate
    category: analysis
    arguments:
      - name: D
        role: derivative
      - name: f
        role: function
      - name: Locus
        role: locus
      - name: X
        role: source_ambient
      - name: Y
        role: target_ambient
    returns: truth_value
    ambient_argument: Y
    polymorphic: true
    surface_forms:
      - derivative
      - has derivative
    description: >
      The object D is the derivative of f at or on the indicated locus.

  - id: pred:left-derivative
    name: LeftDerivative
    kind: predicate
    category: analysis
    arguments:
      - name: D
        role: derivative
      - name: f
        role: function
      - name: Locus
        role: locus
      - name: X
        role: source_ambient
      - name: Y
        role: target_ambient
    returns: truth_value
    ambient_argument: Y
    polymorphic: true
    surface_forms:
      - left derivative
      - left-hand derivative
    description: >
