  - id: pred:successor-covers-nonbase
    name: SuccessorCoversNonbase
    kind: predicate
    category: peano
    arguments:
      - name: S
        role: successor_function
      - name: e
        role: base_element
      - name: A
        role: carrier
    returns: truth_value
    ambient_argument: A
    surface_forms:
      - every non-base element is a successor
      - successor covers nonbase elements
    description: >
      Every element of A other than the base element e is in the image of the
      successor function S.

  - id: pred:successor-system-properties
    name: SuccessorSystemProperties
    kind: predicate
    category: peano
    arguments:
      - name: A
        role: carrier
      - name: e
        role: base_element
      - name: S
        role: successor_function
    returns: truth_value
    ambient_argument: A
    surface_forms:
      - successor-side properties
      - successor system properties
    description: >
      The carrier A, base element e, and successor function S satisfy the
      successor-side Peano properties: e lies in A, S maps A to A, e is not a
      successor value, and S is injective on A.
