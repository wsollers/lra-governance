        surface: '\star'
      - name: A
        role: carrier
    returns: truth_value
    ambient_argument: A
    surface_forms:
      - closed under binary operation
      - binary closure
    description: >
      The binary operation star sends pairs of elements of A to elements of A.

  - id: pred:well-defined-function
    name: WellDefinedFunction
    kind: predicate
    category: well_definedness
    arguments:
