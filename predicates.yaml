    surface_forms:
      - cartesian product
      - product set
    description: >
      The set P is the Cartesian product of A and B.

  - id: pred:relation-from
    name: RelationFrom
    kind: predicate
    category: relation
    arguments:
      - name: R
        role: relation
      - name: A
        role: domain_carrier
      - name: B
        role: codomain_carrier
    returns: truth_value
    surface_forms:
      - relation from
      - relation between
    description: >
      The object R is a binary relation from A to B.

  - id: pred:relation-domain-element
    name: RelationDomainElement
    kind: predicate
    category: relation
    arguments:
      - name: a
        role: element
      - name: R
        role: relation
      - name: A
        role: domain_carrier
      - name: B
        role: codomain_carrier
    returns: truth_value
    surface_forms:
      - relation domain element
      - domain of a relation
    description: >
      The element a belongs to the domain of the relation R from A to B.

  - id: pred:relation-range-element
    name: RelationRangeElement
    kind: predicate
    category: relation
    arguments:
      - name: b
        role: element
      - name: R
        role: relation
      - name: A
        role: domain_carrier
      - name: B
        role: codomain_carrier
    returns: truth_value
    surface_forms:
      - relation range element
      - range of a relation
    description: >
      The element b belongs to the range of the relation R from A to B.

  - id: pred:converse-relation-element
    name: ConverseRelationElement
    kind: predicate
    category: relation
    arguments:
      - name: b
        role: first_component
      - name: a
        role: second_component
      - name: R
        role: relation
    returns: truth_value
    surface_forms:
      - converse relation
      - inverse relation
    description: >
      The ordered pair (b,a) belongs to the converse of R.

  - id: pred:identity-relation
    name: IdentityRelation
    kind: predicate
    category: relation
    arguments:
      - name: Delta
        role: relation
        surface: '\Delta'
      - name: A
        role: carrier
    returns: truth_value
    surface_forms:
      - identity relation
      - diagonal relation
    description: >
      The relation Delta is the identity relation on A.

  - id: pred:relation-composition-element
    name: RelationCompositionElement
    kind: predicate
    category: relation
    arguments:
      - name: a
        role: first_component
      - name: c
        role: second_component
      - name: S
        role: outer_relation
      - name: R
        role: inner_relation
    returns: truth_value
    surface_forms:
      - relation composition
      - composed relation
    description: >
      The ordered pair (a,c) belongs to the composition S composed with R.

  - id: pred:null-relation
    name: NullRelation
    kind: predicate
    category: relation
    arguments:
      - name: R
        role: relation
      - name: A
        role: domain_carrier
      - name: B
        role: codomain_carrier
    returns: truth_value
    surface_forms:
      - null relation
      - empty relation
    description: >
      The relation R from A to B has no related pairs.

  - id: pred:universal-relation
    name: UniversalRelation
    kind: predicate
    category: relation
    arguments:
      - name: R
        role: relation
      - name: A
        role: domain_carrier
      - name: B
        role: codomain_carrier
    returns: truth_value
    surface_forms:
      - universal relation
      - full relation
    description: >
      The relation R from A to B is all of A times B.

  - id: pred:relation-inclusion
    name: RelationInclusion
    kind: predicate
    category: relation
    arguments:
      - name: R
        role: subrelation
      - name: S
        role: superrelation
      - name: A
        role: domain_carrier
      - name: B
        role: codomain_carrier
    returns: truth_value
    surface_forms:
      - relation inclusion
      - subrelation
    description: >
      Every ordered pair in R is also an ordered pair in S.

  - id: pred:relation-equality
    name: RelationEquality
    kind: predicate
    category: relation
    arguments:
      - name: R
        role: left_relation
      - name: S
        role: right_relation
      - name: A
        role: domain_carrier
      - name: B
        role: codomain_carrier
    returns: truth_value
    surface_forms:
      - relation equality
      - equal relations
    description: >
      The relations R and S have exactly the same ordered pairs.

  - id: pred:relation-extension
    name: RelationExtension
    kind: predicate
    category: relation
    arguments:
      - name: R_B
        role: extended_relation
        surface: 'R_B'
      - name: R_A
        role: original_relation
        surface: 'R_A'
      - name: A
        role: original_carrier
      - name: B
        role: extended_carrier
    returns: truth_value
    ambient_argument: B
    surface_forms:
      - relation extension
      - extends relation
      - relation agrees on a subcarrier
    description: >
      The relation R_B on B extends the relation R_A on A by agreeing with
      R_A whenever all compared elements lie in A.

  - id: pred:one-to-many-relation
    name: OneToManyRelation
    kind: predicate
    category: relation
    arguments:
      - name: R
        role: relation
      - name: A
        role: domain_carrier
      - name: B
        role: codomain_carrier
    returns: truth_value
    surface_forms:
      - one-to-many relation
      - one to many
    description: >
      Some element of A is related by R to two distinct elements of B.

  - id: pred:many-to-one-relation
    name: ManyToOneRelation
    kind: predicate
    category: relation
    arguments:
      - name: R
        role: relation
      - name: A
        role: domain_carrier
      - name: B
        role: codomain_carrier
    returns: truth_value
    surface_forms:
      - many-to-one relation
      - many to one
    description: >
      Two distinct elements of A are related by R to the same element of B.

  - id: pred:many-to-many-relation
    name: ManyToManyRelation
    kind: predicate
    category: relation
    arguments:
      - name: R
        role: relation
      - name: A
        role: domain_carrier
      - name: B
        role: codomain_carrier
    returns: truth_value
    surface_forms:
      - many-to-many relation
      - many to many
    description: >
      The relation R is both one-to-many and many-to-one.

  - id: pred:many-place-relation
    name: ManyPlaceRelation
    kind: predicate
    category: relation
    arguments:
      - name: R
        role: relation
      - name: n
        role: arity
      - name: A_i
        role: carriers
    returns: truth_value
    surface_forms:
      - many-place relation
      - n-place relation
      - ternary relation
    description: >
      The relation R is a subset of a finite Cartesian product of n carrier
      sets.

  - id: pred:reflexive
    name: Reflexive
    kind: predicate
    category: relation
    arguments:
      - name: R
        role: relation
      - name: A
        role: carrier
    returns: truth_value
    surface_forms:
      - reflexive
      - reflexive relation
    description: >
      Every element of A is related to itself by R.

  - id: pred:irreflexive
    name: Irreflexive
    kind: predicate
    category: relation
    arguments:
      - name: R
        role: relation
      - name: A
        role: carrier
    returns: truth_value
    surface_forms:
      - irreflexive
      - irreflexive relation
    description: >
      No element of A is related to itself by R.

  - id: pred:symmetric
    name: Symmetric
    kind: predicate
    category: relation
    arguments:
      - name: R
        role: relation
      - name: A
        role: carrier
    returns: truth_value
    surface_forms:
      - symmetric
      - symmetric relation
    description: >
      Whenever one element of A is related to another by R, the reverse
      relation also holds.

  - id: pred:antisymmetric
    name: Antisymmetric
    kind: predicate
    category: relation
    arguments:
      - name: R
        role: relation
      - name: A
        role: carrier
    returns: truth_value
    surface_forms:
      - antisymmetric
      - antisymmetric relation
    description: >
      Two elements of A that are related in both directions by R must be equal.

  - id: pred:asymmetric
    name: Asymmetric
    kind: predicate
    category: relation
    arguments:
      - name: R
        role: relation
      - name: A
        role: carrier
    returns: truth_value
    surface_forms:
      - asymmetric
      - asymmetric relation
    description: >
      Whenever one element of A is related to another by R, the reverse
      relation does not hold.

  - id: pred:transitive
    name: Transitive
    kind: predicate
    category: relation
    arguments:
      - name: R
        role: relation
      - name: A
        role: carrier
    returns: truth_value
    surface_forms:
      - transitive
      - transitive relation
    description: >
      The relation R can be chained across three elements of A.

  - id: pred:total-relation
    name: TotalRelation
    kind: predicate
    category: relation
    arguments:
      - name: R
        role: relation
      - name: A
        role: carrier
    returns: truth_value
    surface_forms:
      - total relation
      - connex relation
      - comparable relation
    description: >
      Any two elements of A are comparable by the relation R.

  - id: pred:equivalence-relation
    name: EquivalenceRelation
    kind: predicate
    category: relation
    arguments:
      - name: R
        role: relation
      - name: A
        role: carrier
    returns: truth_value
    surface_forms:
      - equivalence relation
    description: >
      The relation R is reflexive, symmetric, and transitive on A.

  - id: pred:equivalence-class
    name: EquivalenceClass
    kind: predicate
    category: relation
    arguments:
      - name: C
        role: class
      - name: a
        role: representative
      - name: R
        role: relation
      - name: A
        role: carrier
    returns: truth_value
    surface_forms:
      - equivalence class
      - class of a representative
    description: >
      The set C is the equivalence class of a under R on A.

  - id: pred:quotient-set
    name: QuotientSet
    kind: predicate
    category: relation
    arguments:
      - name: Q
        role: quotient_set
      - name: A
        role: carrier
      - name: R
        role: relation
    returns: truth_value
    surface_forms:
      - quotient set
      - set of equivalence classes
    description: >
      The set Q consists of the equivalence classes of A under R.

  - id: pred:partition
    name: Partition
    kind: predicate
    category: set
    arguments:
      - name: P
        role: family
      - name: A
        role: carrier
    returns: truth_value
    surface_forms:
      - partition
      - partition of a set
    description: >
      The family P is a collection of nonempty, pairwise disjoint subsets whose
      union is A.

  - id: pred:canonical-quotient-map
    name: CanonicalQuotientMap
    kind: predicate
    category: function
    arguments:
      - name: pi
        role: function
        surface: '\pi'
      - name: A
        role: domain
      - name: R
        role: relation
      - name: Q
        role: quotient_set
    returns: truth_value
    surface_forms:
      - canonical surjection
      - quotient map
      - canonical quotient map
    description: >
      The function pi maps each element of A to its equivalence class in Q.

  - id: pred:constant-on-equivalence-classes
    name: ConstantOnEquivalenceClasses
    kind: predicate
    category: function
    arguments:
      - name: f
        role: function
      - name: R
        role: relation
      - name: A
        role: carrier
    returns: truth_value
    surface_forms:
      - constant on equivalence classes
      - respects equivalence
    description: >
      The function f takes equal values on elements of A that are related by R.

  - id: pred:preorder
    name: Preorder
    kind: predicate
    category: relation
    arguments:
      - name: R
        role: relation
      - name: A
        role: carrier
    returns: truth_value
    surface_forms:
      - preorder
      - preordered relation
    description: >
      The relation R is reflexive and transitive on A.

  - id: pred:partial-order
    name: PartialOrder
    kind: predicate
    category: relation
    arguments:
      - name: R
        role: relation
      - name: A
        role: carrier
    returns: truth_value
    surface_forms:
      - partial order
      - poset order
    description: >
      The relation R is reflexive, antisymmetric, and transitive on A.

  - id: pred:strict-partial-order
    name: StrictPartialOrder
    kind: predicate
    category: relation
    arguments:
      - name: R
        role: relation
      - name: A
        role: carrier
    returns: truth_value
    surface_forms:
      - strict partial order
      - strict order
    description: >
      The relation R is irreflexive and transitive on A.

  - id: pred:total-order
    name: TotalOrder
    kind: predicate
    category: relation
    arguments:
      - name: R
        role: relation
      - name: A
        role: carrier
    returns: truth_value
    surface_forms:
      - total order
      - linear order
    description: >
      The relation R is a partial order on A and any two elements of A are
      comparable by R.

  - id: pred:is-well-ordered-set
    name: IsWellOrderedSet
    kind: predicate
    category: order
    arguments:
      - name: W
        role: well_ordered_set_structure
    returns: truth_value
    ambient_argument: W
    surface_forms:
      - is a well-ordered set
      - well-ordering principle
      - well-order laws
    description: >
      The packaged well-ordered-set data satisfies the well-order condition:
      every nonempty subset of the carrier has a least element.

  - id: pred:function
    name: Function
    kind: predicate
    category: function
    arguments:
      - name: f
        role: function
      - name: A
        role: domain
      - name: B
        role: codomain
    returns: truth_value
    surface_forms:
      - function
      - map
      - mapping
    description: >
      The object f is a function with domain A and codomain B.

  - id: pred:function-space
    name: FunctionSpace
    kind: predicate
    category: function
    arguments:
      - name: F
        role: function_space
      - name: A
        role: domain
      - name: B
        role: codomain
    returns: truth_value
    surface_forms:
      - function space
      - set of functions
    description: >
      The set F consists exactly of the functions with domain A and codomain B.

  - id: pred:functional-relation
    name: FunctionalRelation
    kind: predicate
    category: function
    arguments:
      - name: R
        role: relation
      - name: A
        role: domain
      - name: B
        role: codomain
    returns: truth_value
    surface_forms:
      - functional relation
      - right-unique relation
    description: >
      The relation R assigns at most one output in B to each input in A.

  - id: pred:total-on-domain
    name: TotalOnDomain
    kind: predicate
    category: function
    arguments:
      - name: R
        role: relation
      - name: A
        role: domain
      - name: B
        role: codomain
    returns: truth_value
    surface_forms:
      - total on domain
      - left-total relation
    description: >
      The relation R assigns at least one output in B to each input in A.

  - id: pred:partial-function
    name: PartialFunction
    kind: predicate
    category: function
    arguments:
      - name: R
        role: relation
      - name: A
        role: domain
      - name: B
        role: codomain
    returns: truth_value
    surface_forms:
      - partial function
      - partial map
    description: >
      The relation R is single-valued from A to B but need not be defined on
      every input in A.

  - id: pred:function-equal
    name: FunctionEqual
    kind: predicate
    category: function
    arguments:
      - name: f
        role: left_function
      - name: g
        role: right_function
    returns: truth_value
    surface_forms:
      - function equality
      - equal functions
    description: >
      The functions f and g have the same domain, codomain, and pointwise
      values.

  - id: pred:domain-of-function
    name: DomainOfFunction
    kind: predicate
    category: function
    arguments:
      - name: f
        role: function
      - name: A
        role: domain
    returns: truth_value
    surface_forms:
      - domain of a function
      - function domain
    description: >
      The set A is the declared domain of the function f.

  - id: pred:codomain-of-function
    name: CodomainOfFunction
    kind: predicate
    category: function
    arguments:
      - name: f
        role: function
      - name: B
        role: codomain
    returns: truth_value
    surface_forms:
      - codomain of a function
      - function codomain
    description: >
      The set B is the declared codomain of the function f.

  - id: pred:empty-function
    name: EmptyFunction
    kind: predicate
    category: function
    arguments:
      - name: E
        role: function
      - name: B
        role: codomain
    returns: truth_value
    surface_forms:
      - empty function
    description: >
      The empty relation is viewed as the unique function from the empty set to
      B.

  - id: pred:many-place-functional-relation
    name: ManyPlaceFunctionalRelation
    kind: predicate
    category: function
    arguments:
      - name: R
        role: relation
      - name: A
        role: input_domains
      - name: B
        role: output_codomain
    returns: truth_value
    surface_forms:
      - many-place functional relation
      - functional in the last coordinate
    description: >
      The relation R is single-valued in its output coordinate for each tuple
      of input coordinates.

  - id: pred:injective
    name: Injective
    kind: predicate
    category: function
    arguments:
      - name: f
        role: function
      - name: A
        role: domain
      - name: B
        role: codomain
    returns: truth_value
    surface_forms:
      - injective
      - one-to-one
    description: >
      The function f maps distinct elements of A to distinct elements of B.

  - id: pred:surjective
    name: Surjective
    kind: predicate
    category: function
    arguments:
      - name: f
        role: function
      - name: A
        role: domain
      - name: B
        role: codomain
    returns: truth_value
    surface_forms:
      - surjective
      - onto
    description: >
      Every element of B is attained as f(a) for some a in A.

  - id: pred:bijective
    name: Bijective
    kind: predicate
    category: function
    arguments:
      - name: f
        role: function
      - name: A
        role: domain
      - name: B
        role: codomain
    returns: truth_value
    surface_forms:
      - bijective
      - bijection
    description: >
      The function f is both injective and surjective from A to B.

  - id: pred:inverse-function
    name: InverseFunction
    kind: predicate
    category: function
    arguments:
      - name: g
        role: inverse_candidate
      - name: f
        role: function
      - name: A
        role: domain
      - name: B
        role: codomain
    returns: truth_value
    surface_forms:
      - inverse function
      - two-sided inverse
    description: >
      The function g from B to A is a two-sided inverse of f from A to B.

  - id: pred:left-inverse
    name: LeftInverse
    kind: predicate
    category: function
    arguments:
      - name: g
        role: inverse_candidate
      - name: f
        role: function
      - name: A
        role: domain
      - name: B
        role: codomain
    returns: truth_value
    surface_forms:
      - left inverse
    description: >
      The function g is a left inverse of f, so g composed with f is the
      identity on A.

  - id: pred:right-inverse
    name: RightInverse
    kind: predicate
    category: function
    arguments:
      - name: h
        role: inverse_candidate
      - name: f
        role: function
      - name: A
        role: domain
      - name: B
        role: codomain
    returns: truth_value
    surface_forms:
      - right inverse
    description: >
      The function h is a right inverse of f, so f composed with h is the
      identity on B.

  - id: pred:constant-function
    name: ConstantFunction
    kind: predicate
    category: function
    arguments:
      - name: f
        role: function
      - name: A
        role: domain
      - name: B
        role: codomain
    returns: truth_value
    surface_forms:
      - constant function
      - constant map
    description: >
      The function f takes the same value in B on every input from A.

  - id: pred:composition-compatible
    name: CompositionCompatible
    kind: predicate
    category: function
    arguments:
      - name: f
        role: inner_function
      - name: g
        role: outer_function
    returns: truth_value
    surface_forms:
      - composable functions
      - composition compatible
    description: >
      The codomain of f and domain of g are compatible so that g composed with
      f is defined.

  - id: pred:image-element
    name: ImageElement
    kind: predicate
    category: function
    arguments:
      - name: b
        role: element
      - name: f
        role: function
      - name: S
        role: subset
    returns: truth_value
    surface_forms:
      - image element
      - belongs to image
    description: >
      The element b lies in the image of S under f.

  - id: pred:preimage-element
    name: PreimageElement
    kind: predicate
    category: function
    arguments:
      - name: a
        role: element
      - name: f
        role: function
      - name: T
        role: subset
    returns: truth_value
    surface_forms:
      - preimage element
      - belongs to preimage
    description: >
      The element a lies in the preimage of T under f.

  - id: pred:cover-relation
    name: CoverRelation
    kind: predicate
    category: order
    arguments:
      - name: a
        role: lower_element
      - name: b
        role: upper_element
      - name: P
        role: ambient
    returns: truth_value
    ambient_argument: P
    surface_forms:
      - cover relation
      - covers
    description: >
      The element b covers a in the ambient ordered structure P, with no
      element strictly between them.

  - id: pred:hasse-diagram
    name: HasseDiagram
    kind: predicate
    category: order
    arguments:
      - name: G
        role: graph
      - name: P
        role: ambient
    returns: truth_value
    ambient_argument: P
    surface_forms:
      - Hasse diagram
      - order diagram
    description: >
      The graph G records the cover relations of the finite ambient ordered
      structure P.

  - id: pred:order-duality
    name: OrderDuality
    kind: predicate
    category: order
    arguments:
      - name: phi
        role: original_statement
        surface: '\Phi'
      - name: phi_star
        role: dual_statement
        surface: '\Phi^*'
      - name: P
        role: ambient
    returns: truth_value
    ambient_argument: P
    surface_forms:
      - order duality
      - duality principle
    description: >
      The statement phi over an ordered structure corresponds to the dual
      statement phi_star over the dual order.

  - id: pred:induced-order
    name: InducedOrder
    kind: predicate
    category: order
    arguments:
      - name: R
        role: induced_relation
      - name: f
        role: inducing_function
      - name: Q
        role: codomain_ambient
    returns: truth_value
    ambient_argument: Q
    surface_forms:
      - induced order
      - pullback order
    description: >
      The relation R compares domain elements by applying f and then comparing
      their images in the ambient ordered structure Q.

  - id: pred:function-indistinguishable
    name: FunctionIndistinguishable
    kind: predicate
    category: order
    arguments:
      - name: x
        role: first_element
      - name: y
        role: second_element
      - name: f
        role: function
      - name: Q
        role: codomain_ambient
    returns: truth_value
    ambient_argument: Q
    surface_forms:
      - f-indistinguishable
      - indistinguishable through f
    description: >
      The elements x and y cannot be separated by the order of Q after applying
      f.

  - id: pred:suborder
    name: Suborder
    kind: predicate
    category: order
    arguments:
      - name: R
        role: restricted_relation
      - name: S
        role: subset
      - name: P
        role: ambient
    returns: truth_value
    ambient_argument: P
    surface_forms:
      - suborder
      - inherited order
      - restricted order
    description: >
      The relation R is the order inherited by the subset S from the ambient
      ordered structure P.

  - id: pred:symmetric-part
    name: SymmetricPart
    kind: predicate
    category: relation
    arguments:
      - name: I
        role: symmetric_part
      - name: R
        role: relation
      - name: X
        role: carrier
    returns: truth_value
    surface_forms:
      - symmetric part
      - indifference part
    description: >
      The relation I contains exactly the pairs of R whose reverse pair also
      belongs to R.

  - id: pred:asymmetric-part
    name: AsymmetricPart
    kind: predicate
    category: relation
    arguments:
      - name: P
        role: asymmetric_part
      - name: R
        role: relation
