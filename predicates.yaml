      The operation dot is right-distributive over plus on A.

  - id: pred:distributive
    name: Distributive
    kind: predicate
    category: algebra
    arguments:
      - name: A
        role: carrier
      - name: plus
        role: additive_operation
        surface: '+'
      - name: dot
        role: multiplicative_operation
        surface: '\cdot'
    returns: truth_value
    ambient_argument: A
    surface_forms:
      - distributive
      - distributivity
    description: >
      The operation dot is both left- and right-distributive over plus on A.

  - id: pred:zero-absorbing
    name: ZeroAbsorbing
    kind: predicate
    category: algebra
    arguments:
      - name: z
        role: absorbing_element
        surface: '0'
      - name: A
        role: carrier
      - name: star
        role: binary_operation
        surface: '\star'
    returns: truth_value
    ambient_argument: A
    surface_forms:
      - zero absorbing
      - absorbing element
    description: >
      The element z absorbs the operation star on both sides over A.

  - id: pred:left-cancellation
    name: LeftCancellation
    kind: predicate
    category: algebra
    arguments:
      - name: A
        role: carrier
      - name: star
        role: binary_operation
        surface: '\star'
    returns: truth_value
    ambient_argument: A
    surface_forms:
      - left cancellation
      - left cancellative
    description: >
      The operation star satisfies left cancellation on A.

  - id: pred:right-cancellation
    name: RightCancellation
    kind: predicate
    category: algebra
    arguments:
      - name: A
        role: carrier
      - name: star
        role: binary_operation
        surface: '\star'
    returns: truth_value
    ambient_argument: A
    surface_forms:
      - right cancellation
      - right cancellative
    description: >
      The operation star satisfies right cancellation on A.

  - id: pred:operation-extension
    name: OperationExtension
    kind: predicate
    category: algebra
    arguments:
      - name: star_B
        role: extended_operation
        surface: '\star_B'
      - name: star_A
        role: original_operation
        surface: '\star_A'
      - name: A
        role: original_carrier
      - name: B
        role: extended_carrier
    returns: truth_value
    ambient_argument: B
    surface_forms:
      - operation extension
      - extends operation
      - operation agrees on a subcarrier
    description: >
      The operation star_B on B extends the operation star_A on A by agreeing
      with star_A whenever all inputs lie in A.

  - id: pred:unique-value-relation
    name: UniqueValueRelation
    kind: predicate
    category: well_definedness
    arguments:
      - name: R
        role: relation
      - name: A
        role: domain
      - name: B
        role: codomain
    returns: truth_value
    ambient_argument: R
    surface_forms:
      - unique value relation
      - single-valued relation
    description: >
      For every input in A, the relation R has at most one output in B.

  - id: pred:exists-unique-value-relation
    name: ExistsUniqueValueRelation
    kind: predicate
    category: well_definedness
    arguments:
      - name: R
        role: relation
      - name: A
        role: domain
      - name: B
        role: codomain
    returns: truth_value
    ambient_argument: R
    surface_forms:
      - exists unique value relation
      - total single-valued relation
    description: >
      For every input in A, there exists a unique output in B related by R.

  - id: pred:representative-independent
    name: RepresentativeIndependent
    kind: predicate
    category: well_definedness
    arguments:
      - name: F
        role: rule_or_operation
      - name: Q_A
        role: domain_quotient
      - name: Q_B
        role: codomain_quotient
    returns: truth_value
    ambient_argument: F
    surface_forms:
      - representative independent
      - independent of representatives
    description: >
      Equivalent representatives in the domain quotient determine equivalent
      outputs in the codomain quotient under F.

  - id: pred:closed-under-unary-operation
    name: ClosedUnderUnaryOperation
    kind: predicate
    category: algebra
    arguments:
      - name: u
        role: unary_operation
      - name: A
        role: carrier
    returns: truth_value
    ambient_argument: A
    surface_forms:
      - closed under unary operation
      - unary closure
    description: >
      The unary operation u sends elements of A to elements of A.

  - id: pred:closed-under-binary-operation
    name: ClosedUnderBinaryOperation
    kind: predicate
