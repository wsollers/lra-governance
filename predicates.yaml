  - id: pred:well-defined-quotient-operation
    name: WellDefinedQuotientOperation
    kind: predicate
    category: well_definedness
    arguments:
      - name: star_bar
        role: quotient_operation
        surface: '\overline{\star}'
      - name: star
        role: representative_operation
        surface: '\star'
      - name: Q
        role: quotient_structure
    returns: truth_value
    ambient_argument: Q
    surface_forms:
      - well-defined quotient operation
      - operation descends to the quotient
    description: >
      The quotient operation star_bar is induced by star on the quotient
