# Canonical LRA predicate registry.
# Governed by docs/governance/predicate-standards.md.

predicates:
  - id: pred:at-point-operation
    name: AtPointOperation
    kind: predicate
    category: function
    arguments:
      - name: Op
        role: operation
      - name: f_tuple
        role: functions
      - name: x
        role: point
    returns: truth_value
    polymorphic: true
    surface_forms:
      - at-point operation
      - operation applied at a point
    description: >
      A value-level operation is applied to the values of a tuple of functions
      at a single input.

  - id: pred:pointwise-operation
    name: PointwiseOperation
    kind: predicate
    category: function
    arguments:
      - name: Op
        role: operation
      - name: f_tuple
        role: functions
      - name: A
        role: domain
    returns: truth_value
    ambient_argument: A
    polymorphic: true
    surface_forms:
      - pointwise operation
      - operation applied pointwise
    description: >
      A value-level operation is lifted to functions by applying it at every
      input in the domain.

  - id: pred:at-point-relation
    name: AtPointRelation
    kind: predicate
    category: function
    arguments:
      - name: Rel
        role: relation
      - name: f_tuple
        role: functions
      - name: x
        role: point
    returns: truth_value
    polymorphic: true
    surface_forms:
      - at-point relation
      - relation at a point
    description: >
      A value-level relation is checked on the values of a tuple of functions
      at a single input.

  - id: pred:pointwise-relation
    name: PointwiseRelation
    kind: predicate
    category: function
    arguments:
      - name: Rel
        role: relation
      - name: f_tuple
        role: functions
      - name: A
        role: domain
    returns: truth_value
    ambient_argument: A
    polymorphic: true
    surface_forms:
      - pointwise relation
      - relation on a set pointwise
    description: >
      A value-level relation holds on a tuple of function values at every input
      in the domain.

  - id: pred:pointwise-relation-near
    name: PointwiseRelationNear
    kind: predicate
    category: function
    arguments:
      - name: Rel
        role: relation
      - name: f_tuple
        role: functions
      - name: c
        role: base_point
      - name: A
        role: domain
    returns: truth_value
    ambient_argument: A
    polymorphic: true
    surface_forms:
      - pointwise relation near a point
      - relation near a point
    description: >
      A value-level relation holds for function values throughout some deleted
      neighbourhood of a base point inside the domain.

  - id: pred:bounded-near
    name: BoundedNear
    kind: predicate
    category: function
    arguments:
      - name: f
        role: function
      - name: c
        role: base_point
      - name: A
        role: domain
    returns: truth_value
    ambient_argument: A
    polymorphic: true
    surface_forms:
      - bounded near
      - locally bounded
    description: >
      A real-valued function is bounded on some deleted neighbourhood of a base
      point inside the domain.

  - id: pred:bounded-away-from-zero
    name: BoundedAwayFromZero
    kind: predicate
    category: function
    arguments:
      - name: f
        role: function
      - name: A
        role: domain
    returns: truth_value
    ambient_argument: A
    polymorphic: true
    surface_forms:
      - bounded away from zero
      - separated from zero
    description: >
      The absolute value of a real-valued function has a positive lower bound
      on the domain.

  - id: pred:bounded-away-from-zero-near
    name: BoundedAwayFromZeroNear
    kind: predicate
    category: function
    arguments:
      - name: f
        role: function
      - name: c
        role: base_point
      - name: A
        role: domain
    returns: truth_value
    ambient_argument: A
    polymorphic: true
    surface_forms:
      - bounded away from zero near
      - locally separated from zero
    description: >
      A real-valued function is bounded away from zero on some deleted
      neighbourhood of a base point inside the domain.

  - id: pred:uniformly-bounded-family
    name: UniformlyBoundedFamily
    kind: predicate
    category: function
    arguments:
      - name: F
        role: family
      - name: I
        role: index_set
      - name: A
        role: domain
    returns: truth_value
    ambient_argument: A
    polymorphic: true
    surface_forms:
      - uniformly bounded family
      - family uniformly bounded on a set
    description: >
      One real bound controls every function in the family at every input in
      the domain.

  - id: pred:within
    name: Within
    kind: predicate
    category: topology
    arguments:
      - name: x
        role: point
      - name: W
        role: local_region
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - within
      - lies within
      - belongs to a local region
    description: >
      The point x lies within the local region W in the ambient object X.
      The local region may be a tolerance ball, punctured ball, neighborhood,
      punctured neighborhood, or another named localizing object.

  - id: pred:is-ball
    name: IsBall
    kind: predicate
    category: topology
    arguments:
      - name: B
        role: ball
      - name: c
        role: center
      - name: r
        role: radius
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is a ball
      - metric ball
      - open ball
    description: >
      The object B is the ball centered at c with radius r in the ambient
      space X.

  - id: pred:is-punctured-ball
    name: IsPuncturedBall
    kind: predicate
    category: topology
    arguments:
      - name: B_dot
        role: punctured_ball
        surface: 'B^\times'
      - name: B
        role: underlying_ball
      - name: c
        role: center
      - name: r
        role: radius
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is a punctured ball
      - is a deleted ball
    description: >
      The object B_dot is the ball B centered at c with radius r in X after
      removing the center c.

  - id: pred:is-closed-ball
    name: IsClosedBall
    kind: predicate
    category: topology
    arguments:
      - name: B_bar
        role: closed_ball
        surface: '\overline{B}'
      - name: c
        role: center
      - name: r
        role: radius
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is a closed ball
      - closed ball
      - metric closed ball
    description: >
      The object B_bar is the closed ball centered at c with radius r in the
      ambient space X.

  - id: pred:is-punctured-closed-ball
    name: IsPuncturedClosedBall
    kind: predicate
    category: topology
    arguments:
      - name: B_bar_dot
        role: punctured_closed_ball
        surface: '\overline{B}^{\times}'
      - name: B_bar
        role: underlying_closed_ball
        surface: '\overline{B}'
      - name: c
        role: center
      - name: r
        role: radius
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is a punctured closed ball
      - is a deleted closed ball
      - punctured closed ball
      - deleted closed ball
    description: >
      The object B_bar_dot is the closed ball B_bar centered at c with radius r
      in X after removing the center c.

  - id: pred:is-neighborhood
    name: IsNeighborhood
    kind: predicate
    category: topology
    arguments:
      - name: U
        role: neighborhood
      - name: c
        role: center
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is a neighborhood
      - is a neighbourhood
    description: >
      The object U is a neighborhood of c in the ambient topological space X.

  - id: pred:is-punctured-neighborhood
    name: IsPuncturedNeighborhood
    kind: predicate
    category: topology
    arguments:
      - name: U_dot
        role: punctured_neighborhood
        surface: 'U^\times'
      - name: U
        role: underlying_neighborhood
      - name: c
        role: center
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is a punctured neighborhood
      - is a punctured neighbourhood
      - is a deleted neighborhood
      - is a deleted neighbourhood
    description: >
      The object U_dot is the neighborhood U of c in X after removing the
      center c.

  - id: pred:is-topology
    name: IsTopology
    kind: predicate
    category: topology
    arguments:
      - name: tau
        role: topology
        surface: '\tau'
      - name: X
        role: carrier
    returns: truth_value
    ambient_argument: X
    surface_forms:
      - Topology
      - is a topology
      - topology axioms
    description: >
      The collection tau is a topology on the carrier set X.

  - id: pred:is-metric
    name: IsMetric
    kind: predicate
    category: topology
    arguments:
      - name: d
        role: metric
      - name: X
        role: carrier
    returns: truth_value
    ambient_argument: X
    surface_forms:
      - Metric
      - is a metric
      - metric axioms
    description: >
      The function d is a metric on the carrier set X.

  - id: pred:is-pseudo-metric
    name: IsPseudoMetric
    kind: predicate
    category: topology
    arguments:
      - name: d
        role: pseudo_metric
      - name: X
        role: carrier
    returns: truth_value
    ambient_argument: X
    surface_forms:
      - PseudoMetric
      - is a pseudo-metric
      - pseudo-metric axioms
    description: >
      The function d is a pseudo-metric on the carrier set X.

  - id: pred:is-norm
    name: IsNorm
    kind: predicate
    category: topology
    arguments:
      - name: norm
        role: norm
        surface: '\|\cdot\|'
      - name: V
        role: vector_space
    returns: truth_value
    ambient_argument: V
    surface_forms:
      - Norm
      - is a norm
      - norm axioms
    description: >
      The function norm is a norm on the ambient vector space V.

  - id: pred:is-euclidean-space
    name: IsEuclideanSpace
    kind: predicate
    category: topology
    arguments:
      - name: E
        role: euclidean_space_structure
    returns: truth_value
    ambient_argument: E
    surface_forms:
      - EuclideanSpace
      - is a Euclidean space
      - Euclidean space structure
    description: >
      The packaged object E satisfies the Euclidean space structure expected
      in the ambient metric or topological context.

  - id: pred:is-interval
    name: IsInterval
    kind: predicate
    category: topology
    arguments:
      - name: I
        role: interval
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is an interval
      - interval
    description: >
      The object I is an interval in the ambient ordered or topological space
      X.

  - id: pred:is-open-interval
    name: IsOpenInterval
    kind: predicate
    category: topology
    arguments:
      - name: I
        role: interval
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is an open interval
      - open interval
    description: >
      The object I is an interval in X whose finite endpoints are excluded.

  - id: pred:is-closed-interval
    name: IsClosedInterval
    kind: predicate
    category: topology
    arguments:
      - name: I
        role: interval
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is a closed interval
      - closed interval
    description: >
      The object I is an interval in X whose finite endpoints are included.

  - id: pred:is-centered-open-interval
    name: IsCenteredOpenInterval
    kind: predicate
    category: topology
    arguments:
      - name: I
        role: interval
      - name: c
        role: center
      - name: r
        role: radius
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is a centered open interval
      - centered open interval
      - symmetric open interval
      - open interval centered at a point
    description: >
      The object I is the open interval centered at c with radius r in the
      ambient ordered or topological space X.

  - id: pred:is-punctured-centered-open-interval
    name: IsPuncturedCenteredOpenInterval
    kind: predicate
    category: topology
    arguments:
      - name: I_dot
        role: punctured_interval
        surface: 'I^\times'
      - name: I
        role: underlying_interval
      - name: c
        role: center
      - name: r
        role: radius
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is a punctured centered open interval
      - is a deleted centered open interval
      - punctured centered open interval
      - deleted centered open interval
      - punctured symmetric open interval
      - deleted symmetric open interval
    description: >
      The object I_dot is the centered open interval I centered at c with
      radius r in X after removing the center c.

  - id: pred:is-centered-closed-interval
    name: IsCenteredClosedInterval
    kind: predicate
    category: topology
    arguments:
      - name: I
        role: interval
      - name: c
        role: center
      - name: r
        role: radius
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is a centered closed interval
      - centered closed interval
      - symmetric closed interval
      - closed interval centered at a point
    description: >
      The object I is the closed interval centered at c with radius r in the
      ambient ordered or topological space X.

  - id: pred:is-bounded-interval
    name: IsBoundedInterval
    kind: predicate
    category: topology
    arguments:
      - name: I
        role: interval
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is a bounded interval
      - bounded interval
    description: >
      The object I is an interval in X with finite left and right endpoints.

  - id: pred:is-empty
    name: IsEmpty
    kind: predicate
    category: set
    arguments:
      - name: A
        role: object_or_collection
    returns: truth_value
    ambient_argument: A
    polymorphic: true
    surface_forms:
      - empty
      - is empty
      - has no elements
      - has no members
    description: >
      The object or collection A has no elements, members, points, or
      admissible inputs in the relevant ambient context.

  - id: pred:is-nonempty
    name: IsNonempty
    kind: predicate
    category: set
    arguments:
      - name: A
        role: object_or_collection
    returns: truth_value
    ambient_argument: A
    polymorphic: true
    surface_forms:
      - nonempty
      - is nonempty
      - has elements
      - has members
    description: >
      The object or collection A has at least one element, member, point, or
      admissible input in the relevant ambient context.

  - id: pred:converges-to
    name: ConvergesTo
    kind: predicate
    category: sequence
    arguments:
      - name: x
        role: sequence
      - name: L
        role: limit
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - converges to
      - tends to a limit
    description: >
      The sequence or indexed object x converges to L in the ambient object X.

  - id: pred:is-cauchy
    name: IsCauchy
    kind: predicate
    category: sequence
    arguments:
      - name: x
        role: sequence
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - CauchySequence
      - is cauchy
      - cauchy condition
    description: >
      The sequence or indexed object x satisfies the Cauchy condition in X.

  - id: pred:is-null
    name: IsNull
    kind: predicate
    category: sequence
    arguments:
      - name: x
        role: sequence_or_object
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is null
      - null sequence
      - converges to zero
    description: >
      The object x is null in X, typically meaning it converges to the zero
      object of X.

  - id: pred:is-constant
    name: IsConstant
    kind: predicate
    category: function
    arguments:
      - name: x
        role: object
      - name: c
        role: constant_value
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is constant
      - constant object
      - constant sequence
      - constant function
    description: >
      The object x has constant value c in the ambient object X.

  - id: pred:is-ultimately-constant
    name: IsUltimatelyConstant
    kind: predicate
    category: sequence
    arguments:
      - name: x
        role: sequence
      - name: c
        role: eventual_value
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is ultimately constant
      - eventually constant
    description: >
      The sequence x is eventually equal to the value c in X.

  - id: pred:is-subsequence
    name: IsSubsequence
    kind: predicate
    category: sequence
    arguments:
      - name: y
        role: subsequence
      - name: x
        role: sequence
    returns: truth_value
    surface_forms:
      - is a subsequence
      - subsequence
    description: >
      The sequence y is obtained from x by a strictly increasing index map.

  - id: pred:has-convergent-subsequence
    name: HasConvergentSubsequence
    kind: predicate
    category: sequence
    arguments:
      - name: x
        role: sequence
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - has a convergent subsequence
    description: >
      Some subsequence of x converges in the ambient object X.

  - id: pred:is-divergent
    name: IsDivergent
    kind: predicate
    category: sequence
    arguments:
      - name: x
        role: sequence_or_object
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is divergent
      - diverges
    description: >
      The object x fails to converge in the ambient object X.

  - id: pred:diverges-to-positive-infinity
    name: DivergesToPositiveInfinity
    kind: predicate
    category: sequence
    arguments:
      - name: x
        role: sequence_or_function
      - name: P
        role: ambient_ordered_structure
    returns: truth_value
    ambient_argument: P
    polymorphic: true
    surface_forms:
      - diverges to positive infinity
      - tends to positive infinity
    description: >
      The object x eventually exceeds every bound in the ambient ordered
      structure P.

  - id: pred:diverges-to-negative-infinity
    name: DivergesToNegativeInfinity
    kind: predicate
    category: sequence
    arguments:
      - name: x
        role: sequence_or_function
      - name: P
        role: ambient_ordered_structure
    returns: truth_value
    ambient_argument: P
    polymorphic: true
    surface_forms:
      - diverges to negative infinity
      - tends to negative infinity
    description: >
      The object x eventually lies below every bound in the ambient ordered
      structure P.

  - id: pred:is-oscillatory
    name: IsOscillatory
    kind: predicate
    category: sequence
    arguments:
      - name: x
        role: sequence_or_function
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is oscillatory
      - oscillatory behavior
    description: >
      The object x exhibits oscillatory behavior in the ambient object X.

  - id: pred:limsup
    name: Limsup
    kind: predicate
    category: analysis
    arguments:
      - name: L
        role: limit_superior
      - name: x
        role: object
      - name: A
        role: ambient
    returns: truth_value
    ambient_argument: A
    polymorphic: true
    surface_forms:
      - limsup
      - limit superior
    description: >
      The object L is the limit superior of x in the ambient object A.

  - id: pred:liminf
    name: Liminf
    kind: predicate
    category: analysis
    arguments:
      - name: L
        role: limit_inferior
      - name: x
        role: object
      - name: A
        role: ambient
    returns: truth_value
    ambient_argument: A
    polymorphic: true
    surface_forms:
      - liminf
      - limit inferior
    description: >
      The object L is the limit inferior of x in the ambient object A.

  - id: pred:is-cluster-value
    name: IsClusterValue
    kind: predicate
    category: analysis
    arguments:
      - name: L
        role: cluster_value
      - name: x
        role: object
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is a cluster value
      - cluster value
    description: >
      The value L occurs as a cluster value of x in X.

  - id: pred:eventually
    name: Eventually
    kind: predicate
    category: analysis
    arguments:
      - name: phi
        role: property
        surface: '\varphi'
      - name: I
        role: index_or_filter
    returns: truth_value
    polymorphic: true
    surface_forms:
      - eventually
      - eventually true
    description: >
      The property phi holds eventually along the index or filter I.

  - id: pred:frequently
    name: Frequently
    kind: predicate
    category: analysis
    arguments:
      - name: phi
        role: property
        surface: '\varphi'
      - name: I
        role: index_or_filter
    returns: truth_value
    polymorphic: true
    surface_forms:
      - frequently
      - infinitely often
    description: >
      The property phi holds frequently along the index or filter I.

  - id: pred:eventually-equal
    name: EventuallyEqual
    kind: predicate
    category: analysis
    arguments:
      - name: x
        role: left_object
      - name: y
        role: right_object
      - name: I
        role: index_or_filter
    returns: truth_value
    polymorphic: true
    surface_forms:
      - eventually equal
      - equal eventually
    description: >
      The objects x and y agree eventually along the index or filter I.

  - id: pred:is-open
    name: IsOpen
    kind: predicate
    category: topology
    arguments:
      - name: U
        role: subset
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is open
      - open set
    description: >
      The subset U is open in the ambient topological object X.

  - id: pred:is-closed
    name: IsClosed
    kind: predicate
    category: topology
    arguments:
      - name: C
        role: subset
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is closed
      - closed set
    description: >
      The subset C is closed in the ambient topological object X.

  - id: pred:is-compact
    name: IsCompact
    kind: predicate
    category: topology
    arguments:
      - name: K
        role: subset
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is compact
      - compact set
    description: >
      The subset K is compact in the ambient topological object X.

  - id: pred:is-interior
    name: IsInterior
    kind: predicate
    category: topology
    arguments:
      - name: x
        role: point
      - name: A
        role: subset
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is interior
      - interior point
    description: >
      The point x lies in the interior of A relative to X.

  - id: pred:is-on-boundary
    name: IsOnBoundary
    kind: predicate
    category: topology
    arguments:
      - name: x
        role: point
      - name: A
        role: subset
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is on boundary
      - boundary point
    description: >
      The point x lies on the boundary of A relative to X.

  - id: pred:is-cluster
    name: IsCluster
    kind: predicate
    category: topology
    arguments:
      - name: x
        role: point
      - name: A
        role: subset
      - name: X
        role: ambient
    returns: truth_value
    ambient_argument: X
    polymorphic: true
    surface_forms:
      - is cluster
      - cluster point
      - accumulation point
    description: >
      The point x is a cluster point of A relative to X.

  - id: pred:is-adherent
