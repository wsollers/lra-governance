      - name: B
        role: codomain
    returns: truth_value
    ambient_argument: f
    surface_forms:
      - well-defined function
      - function is well defined
    description: >
      The function f assigns a unique element of B to each intended input in A.

  - id: pred:well-defined-unary-operation
    name: WellDefinedUnaryOperation
    kind: predicate
    category: well_definedness
    arguments:
      - name: u
        role: unary_operation
      - name: A
        role: carrier
    returns: truth_value
    ambient_argument: u
    surface_forms:
