# =============================================================
# sync-governance.yml  (RETIRED — archived, not active)
#
# Moved out of .github/workflows/ when governance fan-out sync was retired.
# Governance is no longer synced one-way into other LRA repos, and there is no
# monorepo to assemble into. Leaf repos read lra-governance directly via
# LRA_GOVERNANCE_ROOT, a sibling ../lra-governance checkout, or the build
# Docker image.
#
# Kept only for historical reference. Safe to `git rm`.
# =============================================================

name: Governance sync disabled

on:
  workflow_dispatch:

jobs:
  disabled:
    runs-on: ubuntu-latest
    steps:
      - name: Explain disabled sync
        run: |
          echo "Governance fan-out sync is disabled."
          echo "Leaf repos must use lra-governance directly via LRA_GOVERNANCE_ROOT, ../lra-governance, F:/repos/lra-governance, or the build Docker image."
