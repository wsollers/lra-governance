# File Schema
# Canonical filesystem structure for volumes, chapters, and proof directories.
# Stub generation is derived entirely from this file.
# The Python script instantiates these templates given a volume path and
# chapter subject.

# ---------------------------------------------------------------------------
# Multi-Repo Layout (as of 2026)
# ---------------------------------------------------------------------------
#
# The project uses separate repositories to keep volume builds independent and
# Overleaf-ready.
#
# Repository roles:
#   lra-governance          — constitution, canonical YAMLs, schemas, validators
#   lra-common              — shared LaTeX infrastructure (common/)
#   lra-volume-i .. viii    — independent per-volume Overleaf targets
#   lra-lean                — Lean 4 formalization
#   lra-nurbs               — NURBS/DDE C++ engine
#   lra-knowledge-explorer  — theorem extraction pipeline + HTML explorer
#
# The auditor loads governance files from lra-governance. Set REPO_ROOT or
# --repoDir to the lra-governance checkout when working from a volume repo.

# ---------------------------------------------------------------------------
# Governance Root (lra-governance)
# ---------------------------------------------------------------------------

governance_root:
  - AGENTS.md
  - DESIGN.md
  - REPOSITORY_STRUCTURE.md
  - predicates.yaml              # canonical source — never duplicated
  - structures.yaml              # canonical source — never duplicated
  - notation.yaml                # canonical source — never duplicated
  - relations.yaml               # canonical source — never duplicated
  - constitution/
  - docs/
  - tools/
  - templates/
  - scripts/

# ---------------------------------------------------------------------------
# Volume Repo Root (lra-volume-N)
# ---------------------------------------------------------------------------
# Each volume repo is self-contained and Overleaf-ready.
# common/ may exist only as local build/Overleaf staging from lra-common and
# must not be committed or edited in volume repos.

volume_repo_root:
  - main.tex                     # volume root — Overleaf main document
  - .latexmkrc
  - common/                      # local staging only; ignored by git
  - bibliography/                # volume-owned shard for standalone builds
  - volume-N/                    # replace N with actual volume number

# ---------------------------------------------------------------------------
# Volume Structure (within any repo — monorepo or volume repo)
# ---------------------------------------------------------------------------

volume:
  location: volume-{n}/
  required_files:
    - index.tex
    - chapter.yaml        # chapter registry for this volume in dependency order

  chapter_registry_rule: >
    Every volume declares its canonical chapter subjects in dependency order.
    Registry order is structural, not alphabetical. Canonical chapter subjects
    are authoritative — a chapter must use a subject from the registry.
    Chapter subject names are repository identifiers, not display titles.

# ---------------------------------------------------------------------------
# Book (subject partition inside a volume)
# ---------------------------------------------------------------------------
# A book sits between the volume and its chapters. Uniform path grammar
# volume-{n}/book-{b}/{chapter}/ applies everywhere, including single-book
# volumes. Bourbaki's "Book" is this tier: in this project the repo is the
# Volume and the subject folder inside it is the Book.

book:
  location: volume-{n}/book-{b}/
  name_pattern: ^book-[a-z0-9]+(?:-[a-z0-9]+)*$
  required_files:
    - index.tex            # book router: inputs this book's chapter routers
  router_rule: >
    The volume index.tex inputs each book-{b}/index.tex in book order. Each
    book index.tex inputs its chapter index.tex files in chapter order.
    Chapter routers and everything below them are unchanged by the book tier.
  chapter_field: >
    Each chapter.yaml declares book: book-{b} naming its book. Reachability is
    by the router chain (volume -> book -> chapter), not by this field; the
    field is metadata for tooling and registries and is populated when a
    chapter is placed under its book.

volume_chapter_topic_layout:
  # Names retained for compatibility; layout is volume -> book -> chapter -> topic.
  volume_root: volume-{n}/
  book_location: volume-{n}/book-{b}/
  chapter_location: volume-{n}/book-{b}/{chapter}/
  topic_location:
    notes: volume-{n}/book-{b}/{chapter}/notes/{topic}/
    proofs: volume-{n}/book-{b}/{chapter}/proofs/{topic}/
  required_volume_files:
    - index.tex
    - chapter.yaml
  required_chapter_files:
    - index.tex
    - chapter.yaml
  required_chapter_directories:
    - notes/
    - proofs/
    - proofs/exercises/
  required_topic_files:
    notes/{topic}/:
      - index.tex
    proofs/{topic}/:
      - index.tex
  router_files:
    volume_index: volume-{n}/index.tex
    book_index: volume-{n}/book-{b}/index.tex
    chapter_index: volume-{n}/book-{b}/{chapter}/index.tex
    notes_index: volume-{n}/book-{b}/{chapter}/notes/index.tex
    proofs_index: volume-{n}/book-{b}/{chapter}/proofs/index.tex
    proofs_topic_index: volume-{n}/book-{b}/{chapter}/proofs/{topic}/index.tex
  router_rules:
    - volume index.tex inputs each book-{b}/index.tex in book order
    - book index.tex inputs its chapter index.tex files in chapter order
    - chapter index.tex inputs notes/index.tex and proofs/index.tex
    - notes/index.tex inputs each notes/{topic}/index.tex
    - proofs/index.tex inputs each proofs/{topic}/index.tex
    - proofs/{topic}/index.tex inputs proof files for that topic
  topic_pair_rule: >
    Every active notes topic directory must have a matching proofs topic
    directory with the same topic identifier. A proofs topic directory without
    a matching notes topic directory is orphaned unless explicit
    migration/refactor mode is active.
  legacy_topic_rule: >
    Legacy flat notes files directly under notes/ and legacy flat proof files
    under proofs/notes/ may be recognized only under explicit
    migration/refactor mode. New active topics use notes/{topic}/ and
    proofs/{topic}/.
  audit_tool: tools/governance/audit_volume_layout.py

# ---------------------------------------------------------------------------
# Chapter Structure (full)
# ---------------------------------------------------------------------------

chapter:
  required_files:
    - index.tex
    - chapter.yaml

  required_directories:
    - notes/
    - proofs/
    - proofs/exercises/

  required_files_in_directories:
    notes/:
      - index.tex
    proofs/:
      - index.tex
    proofs/exercises/:
      - index.tex
      - capstone-{chapter}.tex   # {chapter} = repository subject name

  section_structure:
    topic_pair:
      notes/{topic}/:
        - index.tex              # topic router
        - notes-{topic}.tex      # conventional topic body when locally used
        - figure-{n}.tex         # required for every nontrivial TikZ figure
                                  # TikZ only; no preamble; no inline color defs
                                  # no figure env, caption, label, or prose
      proofs/{topic}/:
        - index.tex              # inputs proof files for this topic

  topic_pair_rule: >
    Every authored notes topic folder has a matching proofs topic folder.
    The topic identifier is shared: notes/{topic}/ pairs with proofs/{topic}/.
    New proof-bearing theorem-like environments under notes/{topic}/ must use
    proof files under proofs/{topic}/ unless explicit migration/refactor mode
    is active.

  input_rules:
    - main.tex inputs volumes only
    - chapter index.tex is the only file that inputs proofs/index.tex
    - notes/index.tex inputs each notes/{topic}/index.tex in chapter order
    - proofs/index.tex inputs each proofs/{topic}/index.tex in matching chapter order
    - proofs/{topic}/index.tex inputs proof files for that topic in dependency order
    - proofs/exercises/index.tex inputs exercise proofs with capstone last

# ---------------------------------------------------------------------------
# Chapter Stub Structure (minimum required for a planned chapter)
# ---------------------------------------------------------------------------

chapter_stub:
  required_files:
    - index.tex
    - chapter.yaml

  required_directories:
    - notes/
    - proofs/
    - proofs/exercises/

  required_files_in_directories:
    notes/:
      - index.tex
    proofs/:
      - index.tex
    proofs/exercises/:
      - index.tex
      - capstone-{chapter}.tex

  topic_pair_stub:
    notes/{topic}/:
      - index.tex
    proofs/{topic}/:
      - index.tex

  topic_pair_rule: >
    Section/topic stubs are created as matched notes/proofs topic pairs.
    Stub generation does not create proof files for nonexistent statements.
    Proof files are added only when a proof-bearing theorem-like statement
    exists and the proof stub invariant is satisfied.

  index_tex_order:
    - breadcrumb_box
    - status_box             # Status: Planned
    - structural_roadmap
    - placeholder_inputs     # only if section stubs already exist

  breadcrumb_source: chapter_registry   # neighbors come from registry only

  roadmap_must_state:
    - what the chapter is expected to formalize
    - which prior chapter it depends on
    - which later chapter it feeds into

  naming_rules: >
    A stub chapter does not postpone naming discipline. Folder name, capstone
    name, and future proof paths must already conform to house naming rules.
    Stub generation does not invent detailed theorem lists without being asked.

# ---------------------------------------------------------------------------
# Proof File Structure
# ---------------------------------------------------------------------------

proof_file:
  location: proofs/{topic}/{proof-id}.tex
  legacy_location: proofs/notes/{proof-id}.tex
  legacy_location_rule: >
    The legacy flat proofs/notes/{proof-id}.tex layout may be recognized only
    under explicit migration/refactor mode. New proof files must use the
    topic-mirrored proofs/{topic}/{proof-id}.tex layout.
  naming_rule: lowercase, hyphen-separated, ASCII only, free of LaTeX markup

  topic_match_rule: >
    If the theorem-like environment associated by \LRAProofFor{...} is located
    under notes/{topic}/, the proof file must be located under proofs/{topic}/.
    The proof topic folder must match the notes topic folder unless explicit
    migration/refactor mode is active.

  index_hook_rule: >
    Every proof file must be reachable from proofs/{topic}/index.tex. Every
    proofs/{topic}/index.tex must be reachable from proofs/index.tex. The
    chapter index.tex remains the only chapter-level file that inputs
    proofs/index.tex.

  required_layers_in_order:
    1: newpage
    2: phantomsection
    3: proof_label
    4: proof_for
    5: return_navigation
    6: optional_proof_vault_url
    7: theorem_restatement
    8: professional_standard_proof
    9: detailed_learning_proof
    10: proof_structure
    11: dependencies
    12: clearpage

  layer_definitions:
    newpage: \newpage
    phantomsection: \phantomsection
    proof_label: \label{prf:{theorem-root}}
    proof_for: \LRAProofFor{{theorem-label}}
    return_navigation: remark* Return with \hyperref[{theorem-label}]{Return ...}
    optional_proof_vault_url: \ProofVaultURL{...}
    theorem_restatement: theorem* restatement, unnumbered, no label inside
    professional_standard_proof: proof environment containing "Professional Standard Proof"
    detailed_learning_proof: proof environment containing "Detailed Learning Proof"
    proof_structure: remark* Proof structure
    dependencies: dependencies environment with hyperref links to mathematical labels
    clearpage: \clearpage

  label_rules:
    - proof label must be \label{prf:X} where X matches \label{thm:X} / \label{def:X}
    - label appears outside and prior to all environments
    - no \label{} inside theorem* environment
    - no \label{} inside proof environments

  proof_vault_rules:
    - if a proof is generated from a memorialized handwritten proof image, include \ProofVaultURL{...}
    - \ProofVaultURL{...} appears immediately after the Return remark and before theorem*
    - the URL points to the sanitized proof-vault record, not a raw image
    - extraction treats the macro argument as the proof-vault URL for the owning proof label

  macro_rules:
    - no flash macros
    - no proof-structuring macros
    - only ordinary environments and hyperlinks

  step_rule: >
    Detailed learning proof uses inline bold step headings only:
    \textbf{Step 1.} ...
    No step macros. No separate remark environments to organize steps.

proof_status:
  full:
    required: proof_file.required_layers_in_order
    todo_rule: >
      A full proof must not contain TODO placeholders in the theorem
      restatement, professional standard proof, detailed learning proof, proof
      structure remark, or dependency block.

  stub:
    required: proof_file.required_layers_in_order
    todo_rule: >
      A proof stub keeps the same layers as a full proof file. It may use
      TODO-safe placeholders in the theorem restatement, professional standard
      proof, detailed learning proof, proof structure remark, and dependencies
      block. The professional standard proof body and detailed learning proof
      body must both be present, even when they contain TODO placeholders.
    durable_container_rule: >
      Later proof population modifies the stub in place and preserves proof
      label, \LRAProofFor{...}, return navigation, proof-vault URL if present,
      theorem restatement, extraction-visible metadata, proof structure, and
      dependency block.

proof_layout_audit:
  tool: tools/governance/audit_proof_layout.py
  outputs:
    - compliant_full
    - compliant_stub
    - non_compliant
  strict_rule: >
    In strict mode, any non-compliant proof file causes a nonzero exit status.

# ---------------------------------------------------------------------------
# Capstone Structure
# ---------------------------------------------------------------------------

capstone:
  location: proofs/exercises/capstone-{chapter}.tex
  position: last in proofs/exercises/index.tex

  scope_rule: >
    A capstone must synthesize the chapter's material using only concepts that
    are pedagogical prerequisites of or within the current chapter. It must not
    invoke concepts from any chapter that succeeds it in the chapter registry
    dependency order.

  dependency_ceiling: chapter_registry_order
    # The capstone may reference any concept from chapters at or before the
    # current chapter in the registry. Concepts from later chapters are
    # forbidden regardless of how closely related they may seem.

  content_requirement: >
    The capstone is exactly one problem. It must require the student to
    synthesize multiple results from within the chapter. It is not a routine
    exercise and not a proof of a theorem already established in the notes.

  example:
    chapter: bounds
    permitted: supremum, infimum, upper bound, lower bound, completeness axiom
    forbidden: derivatives, integrals, limits of functions, continuity

# ---------------------------------------------------------------------------
# Breadcrumb Box Structure
# ---------------------------------------------------------------------------

breadcrumb:
  environment: tcolorbox (breadcrumb palette)
  title_rule: chapter subject name, not the word "Breadcrumb"

  content_rule: >
    Arrow chain showing immediate conceptual neighborhood only.
    Not the full historical dependency spine.
    Format: prior \;\to\; prior-neighbor \;\to\; \textbf{current} \;\to\; next
    Current chapter is bolded.
    Neighbors sourced from chapter registry only.

  formatting:
    arrow: $\;\to\;$
    current: \textbf{...}
    max_lines: 2

  scope_rule: >
    Full dependency structure belongs in the roadmap and in graph files,
    not in the breadcrumb.

  stub_rule: >
    Stub chapters still carry a breadcrumb. A stub chapter inserts a
    Status: Planned box immediately after the breadcrumb.

# ---------------------------------------------------------------------------
# Auditor Path Rules (Multi-Repo)
# ---------------------------------------------------------------------------

auditor_paths:
  governance_root_discovery:
    - check REPO_ROOT environment variable
    - walk up from cwd looking for constitution/master.md

  volume_repo_usage: >
    When working in a volume repo (e.g., lra-volume-i), set REPO_ROOT or pass
    --repoDir pointing at the lra-governance checkout. The auditor will scan
    LaTeX files from the path you specify but load constitution files and
    canonical YAMLs from REPO_ROOT.

  canonical_yaml_locations:
    predicates: REPO_ROOT/predicates.yaml
    structures: REPO_ROOT/structures.yaml
    notation:   REPO_ROOT/notation.yaml
    relations:  REPO_ROOT/relations.yaml

  constitution_location: REPO_ROOT/constitution/

  common_location:
    governance: not owned here
    volume_repos: lra-volume-N/common/   # local staging only; do not commit
    source_of_truth: lra-common/common/
