# Block Registry
# Every possible logical block in a theorem-like or definition environment.
# This is the single source of truth for block identity, trigger conditions,
# and parent dependencies.
#
# Fields:
#   id:           machine identifier used in artifact-matrix.yaml
#   display:      human-readable block name
#   environment:  LaTeX environment or structural role
#   requirement:  base level — R (required) / C (conditional) / D (dependent) / N (never)
#                 artifact-matrix.yaml overrides this per artifact type
#   parent:       block id this block depends on (for D-type blocks)
#   trigger:      explicit condition that must be true for a C-type block to be generated
#   proof_usage:  true if the negated/contrapositive form standardly appears in proofs
#                 in the mathematical literature for this concept class
#   notes:        clarifying remarks for the auditor or generator

blocks:

  - id: toolkit_box
    display: Toolkit Box
    environment: tcolorbox (gray, section top)
    requirement: R
    parent: null
    trigger: null
    proof_usage: null
    notes: >
      Exactly one toolkit box per section. Names the concept family, lists the
      atomic notions that follow, provides structural orientation. Must enumerate
      exactly the atomic items that follow. Not a formal definition or theorem.

  - id: environment_label
    display: Environment + Label
    environment: definition / theorem / lemma / proposition / corollary / axiom
    requirement: R
    parent: null
    trigger: null
    proof_usage: null
    notes: >
      Every theorem-like environment carries exactly one label. Label prefix is
      determined by artifact type (def:, thm:, lem:, prop:, cor:, ax:).
      Unlabeled environments are non-compliant.

  - id: box
    display: Box (tcolorbox)
    environment: tcolorbox wrapping the environment
    requirement: C
    parent: null
    trigger: >
      Definitions: boxed only when load-bearing for the section or chapter;
      auxiliary definitions, notation declarations, routine derived notions,
      and second appearances are normally unboxed.
      Theorems: required only if the theorem has a proper name, is the primary
      result of the section, and will be cited later by name.
      Lemmas, propositions, and corollaries: required only if structurally
      promoted in the same sense; otherwise absent.
      Axioms: always required.
      Remarks, examples, proofs, and second appearances: never boxed.
    proof_usage: null
    notes: >
      Boxes are structural emphasis, not default decoration for every formal
      environment. At most one structurally dominant boxed theorem per section.
      Toolkit boxes do not count toward box density.

  - id: proof_link
    display: Proof Navigation Link
    environment: hyperref inside environment body
    requirement: C
    parent: null
    trigger: >
      Required for all theorem-like environments that have a corresponding proof
      file (thm, lem, prop, cor). Not applicable for definitions or axioms.
    proof_usage: null
    notes: >
      Pattern: \hyperref[prf:...]{Go to proof.}
      Must appear at the end of the environment body before \end{...}.

  - id: standard_quantified_stmt
    display: Standard Quantified Statement
    environment: remark* titled "Standard quantified statement"
    requirement: R
    parent: null
    trigger: null
    proof_usage: null
    notes: >
      Required for every definition, axiom, theorem, lemma, proposition, and
      corollary. Contains standard mathematical notation only. No predicate
      names from predicates.yaml. Uses canonical quantifier forms from
      notation.yaml. Multi-clause statements must use aligned environments.

  - id: predicate_reading
    display: Predicate Reading
    environment: remark* titled "Predicate reading"
    requirement: C
    parent: null
    trigger: >
      Required when the Standard quantified statement contains at least two
      quantified variable binders, counting comma-separated binders separately.
      Examples: \forall x,y counts as two binders; \forall x,y,z counts as
      three; \forall x,y,z\in A counts as three; \forall y\in B\,\exists x\in A
      counts as two. Also generated whenever a canonical predicate exists in
      predicates.yaml and materially improves proof use or concept recognition.
      If a predicate is required but missing from the canonical vocabulary, emit
      a MISSING_PREDICATE audit marker instead of inventing a local predicate.
    proof_usage: null
    notes: >
      Predicate names typeset with \operatorname{...}. The title is always
      "Predicate reading" for definitions and theorem-like environments.
      "Definition predicate reading" is a legacy title accepted only during
      migration. Predicate signatures and ambient-structure arguments are
      governed by docs/governance/predicate-standards.md; use the canonical
      ambient object argument rather than inventing specialized names.
      Underbrace decomposition permitted when it clarifies conjunctive or
      disjunctive structure.

  - id: negated_quantified_stmt
    display: Negated Quantified Statement
    environment: remark* titled "Negated quantified statement"
    requirement: C
    parent: null
    trigger: >
      Required when the Standard quantified statement has at least two
      quantified variable binders, or when the statement has standard witness
      behavior, named failure behavior, or a failure form commonly used in
      proofs. Examples where proof_usage is true: upper bound, Cauchy sequence,
      convergence, injectivity, surjectivity, monotonicity, boundedness.
    proof_usage: true
    notes: >
      Contains the formal negation only. No explanatory prose. Prose about the
      negation belongs in failure-mode or interpretation blocks.

  - id: negation_predicate_reading
    display: Negation Predicate Reading
    environment: remark* titled "Negation predicate reading"
    requirement: D
    parent: negated_quantified_stmt
    trigger: null
    proof_usage: null
    notes: >
      Required if and only if negated_quantified_stmt was generated and
      predicate_reading is present.

  - id: failure_modes
    display: Failure Modes
    environment: remark* titled "Failure modes"
    requirement: C
    parent: null
    trigger: >
      Required when the negation has named branches, witness behavior, or
      multiple independent ways to fail. Typically accompanies
      negated_quantified_stmt but remains a separate block.
    proof_usage: null
    notes: >
      Structured block using a description environment. The first item is
      \item[Exposition.] and gives the general failure picture in proper
      reference voice. Each following \item[<Mode name>.] names one failure
      mode and contains mode-specific exposition, a quantified failure display,
      and a predicate reading of the failure when predicate language exists.
      "Failure mode decomposition" is a legacy block title accepted only during
      migration.

  - id: contrapositive_quantified_stmt
    display: Contrapositive Quantified Statement
    environment: remark* titled "Contrapositive quantified statement"
    requirement: C
    parent: null
    trigger: >
      Generated for theorem-like statements when the statement is an implication,
      the Standard quantified statement has at least two quantified variable
      binders, and the contrapositive is a standard useful proof tool. Apply the
      same proof-usage standard as for negated_quantified_stmt.
    proof_usage: true
    notes: >
      Only for theorem-like environments (not definitions, which have no
      hypothesis-conclusion structure). Not generated merely because a
      contrapositive can be written formally.

  - id: contrapositive_predicate_reading
    display: Contrapositive Predicate Reading
    environment: remark* titled "Contrapositive predicate reading"
    requirement: D
    parent: contrapositive_quantified_stmt
    trigger: null
    proof_usage: null
    notes: >
      Required if and only if contrapositive_quantified_stmt was generated and
      predicate_reading is present.

  - id: interpretation
    display: Interpretation Block
    environment: remark* titled "Interpretation"
    requirement: R
    parent: null
    trigger: >
      Required for every formal item.
    proof_usage: null
    notes: >
      Prose only. No formal predicate language unless explicitly discussed as
      notation. Explains the mathematical fact, why it is true, why it matters,
      its standard failure mode, and its structural or geometric picture.

  - id: notation
    display: Notation
    environment: remark* titled "Notation"
    requirement: C
    parent: null
    trigger: >
      Generated when the artifact introduces, fixes, or records a notation,
      reading convention, or ambient convention that is not fully captured by
      the formal statement alone.
    proof_usage: null
    notes: >
      Explanatory metadata only. Use for symbol-reading conventions such as
      E^\circ read as the interior of E, or ambient complement conventions such
      as E^c = X \setminus E when X is fixed. Appears after Interpretation and
      before Historical note / Comparison with Feferman.

  - id: source_crosswalk
    display: Source Crosswalk Remark
    environment: remark* titled "Historical note" or "Comparison with Feferman"
    requirement: C
    parent: null
    trigger: >
      Generated only when the item has a known correspondence with a source
      text such as Feferman's The Number Systems. "Historical note" records
      direct provenance. "Comparison with Feferman" records structural
      differences such as splitting, refinement, or different organization.
    proof_usage: null
    notes: >
      Expository metadata only. Short prose, normally two to six sentences.
      Appears after Interpretation and before Exposition, Examples,
      Non-Examples, and Dependencies. Never appears inside formal
      environments, quantified statements, predicate readings, negation
      blocks, or failure-mode decompositions. Use natbib-compatible commands
      such as \citet{FefermanNumberSystems1964} or
      \citep{FefermanNumberSystems1964}.

  - id: exposition
    display: Exposition
    environment: remark* titled "Exposition"
    requirement: C
    parent: null
    trigger: >
      Generated when a topic benefits from conceptual explanation,
      motivation, intuition, historical context, structural commentary,
      methodological context, or connections to nearby topics. Do not generate
      when the block would merely restate the formal statement or duplicate
      the Interpretation block.
    proof_usage: null
    notes: >
      Explanatory metadata attached to the nearest relevant formal item or
      section. Uses normal unboxed remark* styling. Does not create a
      knowledge-graph node by default and must not be used as a formal
      dependency target.

  - id: examples
    display: Examples
    environment: remark* titled "Examples"
    requirement: C
    parent: null
    trigger: >
      Generated for definitions when examples materially improve
      concept-boundary recognition. Especially valuable for major algebraic
      or structural objects, subtle predicates, and frequently confused
      concepts. Usually omitted for simple auxiliary definitions, notation
      declarations, obvious derived concepts, or definitions whose examples
      immediately appear in nearby theorems.
    proof_usage: null
    notes: >
      Explanatory metadata attached to the owning definition. Does not create
      a knowledge-graph node and must not be used as a formal dependency
      target.

  - id: non_examples
    display: Non-Examples
    environment: remark* titled "Non-Examples"
    requirement: C
    parent: null
    trigger: >
      Generated for definitions when non-examples materially improve
      concept-boundary recognition or prevent a common confusion.
      Non-examples are especially useful for major structures, subtle
      predicates, and frequently confused pairs of concepts.
    proof_usage: null
    notes: >
      Explanatory metadata attached to the owning definition. Non-examples
      should identify the precise failed axiom, condition, or hypothesis
      whenever practical. Does not create a knowledge-graph node and must not
      be used as a formal dependency target.

  - id: dependencies
    display: Dependencies Block
    environment: remark* titled "Dependencies" or silent \NoLocalDependencies marker
    requirement: R
    parent: null
    trigger: null
    proof_usage: null
    notes: >
      Always present. Lists explicit \hyperref[...] links to all formal items
      this environment depends on. If foundational within current local note
      scope and there are no local dependencies to display, use the silent
      marker \NoLocalDependencies rather than a visible remark that says
      "No local dependencies." Dependency labels point to formal
      items only (def, thm, lem, prop, cor, ax) — never to proof labels.
      Optional downstream blocks: Consequences, Equivalent forms.
