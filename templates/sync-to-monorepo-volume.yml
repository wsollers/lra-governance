name: Sync volume-__VOLUME__ to monorepo

on:
  push:
    branches: [main]
    paths:
      - 'volume-__VOLUME__/**'
      - 'bibliography/__BIB__'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout lra-volume-__VOLUME__
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          repository: wsollers/Learning-Real-Analysis
          token: ${{ secrets.SYNC_PAT }}
          path: monorepo

      - name: Validate volume bibliography
        run: |
          cd source
          python scripts/check_bibliography.py --bib-dir bibliography

      - name: Validate volume
        run: |
          cd source
          python scripts/build_volume.py --validate-only

      - name: Sync volume-__VOLUME__/ into monorepo
        run: |
          rsync -av --delete source/volume-__VOLUME__/ monorepo/volume-__VOLUME__/

      - name: Sync volume-__VOLUME__ bibliography into monorepo
        run: |
          mkdir -p monorepo/bibliography
          cp source/bibliography/__BIB__ monorepo/bibliography/__BIB__

      - name: Commit and push if changed
        run: |
          cd monorepo
          git config user.name  "lra-sync-bot"
          git config user.email "sync-bot@noreply.github.com"
          git add volume-__VOLUME__/ bibliography/__BIB__
          git diff --cached --quiet && echo "No changes to sync" && exit 0
          git commit -m "chore: sync volume-__VOLUME__ from lra-volume-__VOLUME__"
          git push
