# Canonical LRA structure registry.
# Governed by docs/governance/predicate-standards.md and
# docs/architecture/canonical-yaml.md.

structures:
  - id: struct:ordered-set
    name: OrderedSet
    kind: structure
    category: order
    constructor: '\mathsf{OrderedSet}'
    arguments:
      - name: A
        role: carrier
      - name: le
        role: order_relation
        surface: '\leq'
    carrier_argument: A
    structural_arguments:
      - le
    carried_context:
      - kind: carrier
        source: argument
        argument: A
        exposes_as: carrier
      - kind: order_relation
        source: argument
        argument: le
        exposes_as: order_relation
    surface_forms:
      - ordered set
      - ordered structure
      - order-bearing set
    description: >
      Ambient structure built from a carrier set A and a binary relation le
      used as the order relation. This constructor supplies the structure
      passed to order predicates; separate predicates state the order axioms
      when needed.

  - id: struct:preordered-set
    name: PreorderedSet
    kind: structure
    category: order
    constructor: '\mathsf{PreorderedSet}'
    arguments:
      - name: A
        role: carrier
      - name: le
        role: preorder_relation
        surface: '\leq'
    carrier_argument: A
    structural_arguments:
      - le
    carried_context:
      - kind: carrier
        source: argument
        argument: A
        exposes_as: carrier
      - kind: preorder_relation
        source: argument
        argument: le
        exposes_as: order_relation
    surface_forms:
      - preordered set
      - preorder
      - preorder structure
    description: >
      Ambient ordered structure whose relation is intended to satisfy the
      preorder axioms on A.

  - id: struct:partially-ordered-set
    name: PartiallyOrderedSet
    kind: structure
    category: order
    constructor: '\mathsf{PartiallyOrderedSet}'
    arguments:
      - name: A
        role: carrier
      - name: le
        role: partial_order_relation
        surface: '\leq'
    carrier_argument: A
    structural_arguments:
      - le
    carried_context:
      - kind: carrier
        source: argument
        argument: A
        exposes_as: carrier
      - kind: partial_order_relation
        source: argument
        argument: le
        exposes_as: order_relation
    surface_forms:
      - partially ordered set
      - poset
      - partial order structure
    description: >
      Ambient ordered structure whose relation is intended to satisfy the
      partial order axioms on A.

  - id: struct:totally-ordered-set
    name: TotallyOrderedSet
    kind: structure
    category: order
    constructor: '\mathsf{TotallyOrderedSet}'
    arguments:
      - name: A
        role: carrier
      - name: le
        role: total_order_relation
        surface: '\leq'
    carrier_argument: A
    structural_arguments:
      - le
    carried_context:
      - kind: carrier
        source: argument
        argument: A
        exposes_as: carrier
      - kind: total_order_relation
        source: argument
        argument: le
        exposes_as: order_relation
    surface_forms:
      - totally ordered set
      - total order
      - linear order
    description: >
      Ambient ordered structure whose relation is intended to satisfy the total
      order axioms on A.

  - id: struct:order-dense-set
    name: OrderDenseSet
    kind: structure
    category: order
    constructor: '\mathsf{OrderDenseSet}'
    arguments:
      - name: A
        role: subset
      - name: P
        role: ambient_order
    carrier_argument: A
    structural_arguments:
      - P
    surface_forms:
      - order dense set
      - order-dense set
      - order dense subset
      - dense in the order
    description: >
      Context object packaging a subset A as order dense in the ambient ordered
      structure P. Predicates such as IsOrderDenseSubset(A,P) assert the
      order-density condition, while HasDenseOrder(P) is the self-dense
      ambient-order case.

  - id: struct:well-ordered-set
    name: WellOrderedSet
    kind: structure
    category: order
    constructor: '\mathsf{WellOrderedSet}'
    arguments:
      - name: A
        role: carrier
      - name: le
        role: well_order_relation
        surface: '\leq'
    carrier_argument: A
    structural_arguments:
      - le
    surface_forms:
      - well-ordered set
      - well-order
      - well-order structure
    description: >
      Ambient ordered structure whose relation is intended to satisfy the
      well-order condition on A.

  - id: struct:dual-poset
    name: DualPoset
    kind: structure
    category: order
    constructor: '\mathsf{DualPoset}'
    arguments:
      - name: A
        role: carrier
      - name: ge
        role: dual_order_relation
        surface: '\geq'
    carrier_argument: A
    structural_arguments:
      - ge
    surface_forms:
      - dual poset
      - dual ordered set
      - opposite order
    description: >
      Ambient ordered structure obtained by reversing the order relation on a
      poset with carrier A.

  - id: struct:lattice
    name: Lattice
    kind: structure
    category: order
    constructor: '\mathsf{Lattice}'
    arguments:
      - name: L
        role: carrier
      - name: le
        role: order_relation
        surface: '\leq'
      - name: join
        role: join_operation
        surface: '\vee'
      - name: meet
        role: meet_operation
        surface: '\wedge'
    carrier_argument: L
    structural_arguments:
      - le
      - join
      - meet
    surface_forms:
      - lattice
      - lattice structure
    description: >
      Ambient lattice structure on carrier L with order, join, and meet data.

  - id: struct:complete-lattice
    name: CompleteLattice
    kind: structure
    category: order
    constructor: '\mathsf{CompleteLattice}'
    arguments:
      - name: L
        role: carrier
      - name: le
        role: order_relation
        surface: '\leq'
      - name: join
        role: join_operation
        surface: '\vee'
      - name: meet
        role: meet_operation
        surface: '\wedge'
    carrier_argument: L
    structural_arguments:
      - le
      - join
      - meet
    surface_forms:
      - complete lattice
      - complete lattice structure
    description: >
      Ambient lattice structure in which arbitrary subsets are intended to
      have suprema and infima.

  - id: struct:distributive-lattice
    name: DistributiveLattice
    kind: structure
    category: order
    constructor: '\mathsf{DistributiveLattice}'
    arguments:
      - name: L
        role: carrier
      - name: le
        role: order_relation
        surface: '\leq'
      - name: join
        role: join_operation
        surface: '\vee'
      - name: meet
        role: meet_operation
        surface: '\wedge'
    carrier_argument: L
    structural_arguments:
      - le
      - join
      - meet
    surface_forms:
      - distributive lattice
    description: >
      Ambient lattice structure whose join and meet operations satisfy the
      distributive laws.

  - id: struct:boolean-lattice
    name: BooleanLattice
    kind: structure
    category: order
    constructor: '\mathsf{BooleanLattice}'
    arguments:
      - name: L
        role: carrier
      - name: le
        role: order_relation
        surface: '\leq'
      - name: join
        role: join_operation
        surface: '\vee'
      - name: meet
        role: meet_operation
        surface: '\wedge'
      - name: complement
        role: complement_operation
      - name: bottom
        role: least_element
        surface: '0'
      - name: top
        role: greatest_element
        surface: '1'
    carrier_argument: L
    structural_arguments:
      - le
      - join
      - meet
      - complement
      - bottom
      - top
    surface_forms:
      - boolean lattice
      - complemented distributive lattice
    description: >
      Ambient Boolean lattice structure with order, lattice operations,
      complement, bottom, and top.

  - id: struct:function-space
    name: FunctionSpace
    kind: structure
    category: function
    constructor: '\mathsf{FunctionSpace}'
    arguments:
      - name: A
        role: domain
      - name: B
        role: codomain
    carrier_argument: null
    structural_arguments:
      - A
      - B
    carried_context:
      - kind: domain
        source: argument
        argument: A
        exposes_as: function_domain
      - kind: codomain
        source: argument
        argument: B
        exposes_as: function_codomain
    surface_forms:
      - function space
      - functions from A to B
    description: >
      Ambient structure for functions with domain A and codomain B.

  - id: struct:set-family
    name: SetFamily
    kind: structure
    category: set
    constructor: '\mathsf{SetFamily}'
    arguments:
      - name: F
        role: family
        surface: '\mathcal{F}'
      - name: U
        role: ambient_set
    carrier_argument: U
    structural_arguments:
      - F
    carried_context:
      - kind: family
        source: argument
        argument: F
        exposes_as: set_family
      - kind: ambient_set
        source: argument
        argument: U
        exposes_as: ambient_set
    surface_forms:
      - set family
      - family of sets
      - collection of sets
    description: >
      Ambient structure for a family of subsets of a fixed ambient set U.

  - id: struct:sequence
    name: Sequence
    kind: structure
    category: sequence
    constructor: '\mathsf{Sequence}'
    arguments:
      - name: x
        role: sequence
      - name: I
        role: index_set
      - name: X
        role: ambient
    carrier_argument: X
    structural_arguments:
      - x
      - I
    carried_context:
      - kind: sequence
        source: argument
        argument: x
        exposes_as: indexed_object
      - kind: index_set
        source: argument
        argument: I
        exposes_as: index_set
      - kind: ambient
        source: argument
        argument: X
        exposes_as: value_ambient
    surface_forms:
      - sequence
      - indexed sequence
      - sequence in an ambient space
    description: >
      Indexed object x with index set I and values in the ambient object X.
      Ordinary real sequences use the natural numbers as the index set.

  - id: struct:tail-sequence
    name: TailSequence
    kind: structure
    category: sequence
    constructor: '\mathsf{TailSequence}'
    arguments:
      - name: x
        role: source_sequence
      - name: M
        role: start_index
      - name: I
        role: index_set
      - name: X
        role: ambient
    carrier_argument: X
    structural_arguments:
      - x
      - M
      - I
    surface_forms:
      - tail sequence
      - M-tail
      - sequence tail
    description: >
      Sequence obtained from a source sequence x by discarding all terms before
      the start index M and reindexing the remaining terms over I.

  - id: struct:point
    name: Point
    kind: structure
    category: set
    constructor: '\mathsf{Point}'
    arguments:
      - name: x
        role: element
      - name: X
        role: ambient_set
    carrier_argument: X
    structural_arguments:
      - x
    surface_forms:
      - point
      - point of a set
      - element of an ambient set
    description: >
      Ambient typing structure recording that x is a particular point of the
      set or space X. This structure covers ordinary elements, ordered pairs,
      tuples, vectors, and other objects by treating them as points of their
      ambient carrier.

  - id: struct:metric-space
    name: MetricSpace
    kind: structure
    category: topology
    constructor: '\mathsf{MetricSpace}'
    arguments:
      - name: X
        role: carrier
      - name: d
        role: metric
    carrier_argument: X
    structural_arguments:
      - d
    carried_context:
      - kind: carrier
        source: argument
        argument: X
        exposes_as: carrier
      - kind: metric
        source: argument
        argument: d
        exposes_as: metric
    surface_forms:
      - metric space
      - metric structure
    description: >
      Ambient metric structure with carrier X and distance function d.

  - id: struct:ball
    name: Ball
    kind: structure
    category: topology
    constructor: '\mathsf{Ball}'
    arguments:
      - name: B
        role: ball
      - name: c
        role: center
      - name: r
        role: radius
      - name: X
        role: ambient
    carrier_argument: X
    structural_arguments:
      - B
      - c
      - r
    surface_forms:
      - ball
      - metric ball
      - open ball
    description: >
      Local region B determined by center c and radius r in the ambient space
      X. This structure names the region so membership can be stated by
      predicates such as Within.

  - id: struct:punctured-ball
    name: PuncturedBall
    kind: structure
    category: topology
    constructor: '\mathsf{PuncturedBall}'
    arguments:
      - name: B_dot
        role: punctured_ball
        surface: 'B^\times'
      - name: B
        role: underlying_ball
      - name: c
        role: center
      - name: r
        role: radius
      - name: X
        role: ambient
    carrier_argument: X
    structural_arguments:
      - B_dot
      - B
      - c
      - r
    surface_forms:
      - punctured ball
      - deleted ball
    description: >
      Local region B_dot obtained from the ball B centered at c with radius r
      in X by removing the center c.

  - id: struct:closed-ball
    name: ClosedBall
    kind: structure
    category: topology
    constructor: '\mathsf{ClosedBall}'
    arguments:
      - name: B_bar
        role: closed_ball
        surface: '\overline{B}'
      - name: c
        role: center
      - name: r
        role: radius
      - name: X
        role: ambient
    carrier_argument: X
    structural_arguments:
      - B_bar
      - c
      - r
    surface_forms:
      - closed ball
      - metric closed ball
    description: >
      Local region B_bar determined by center c and radius r in the ambient
      space X, consisting of points whose distance from c is at most r.

  - id: struct:punctured-closed-ball
    name: PuncturedClosedBall
    kind: structure
    category: topology
    constructor: '\mathsf{PuncturedClosedBall}'
    arguments:
      - name: B_bar_dot
        role: punctured_closed_ball
        surface: '\overline{B}^{\times}'
      - name: B_bar
        role: underlying_closed_ball
        surface: '\overline{B}'
      - name: c
        role: center
      - name: r
        role: radius
      - name: X
        role: ambient
    carrier_argument: X
    structural_arguments:
      - B_bar_dot
      - B_bar
      - c
      - r
    surface_forms:
      - punctured closed ball
      - deleted closed ball
    description: >
      Local region B_bar_dot obtained from the closed ball B_bar centered at c
      with radius r in X by removing the center c.

  - id: struct:neighborhood
    name: Neighborhood
    kind: structure
    category: topology
    constructor: '\mathsf{Neighborhood}'
    arguments:
      - name: U
        role: neighborhood
      - name: c
        role: center
      - name: X
        role: ambient
    carrier_argument: X
    structural_arguments:
      - U
      - c
    surface_forms:
      - neighborhood
      - neighbourhood
    description: >
      Local region U around center c in the ambient topological space X.
      This structure names the region independently of any particular point
      later tested for membership.

  - id: struct:punctured-neighborhood
    name: PuncturedNeighborhood
    kind: structure
    category: topology
    constructor: '\mathsf{PuncturedNeighborhood}'
    arguments:
      - name: U_dot
        role: punctured_neighborhood
        surface: 'U^\times'
      - name: U
        role: underlying_neighborhood
      - name: c
        role: center
      - name: X
        role: ambient
    carrier_argument: X
    structural_arguments:
      - U_dot
      - U
      - c
    surface_forms:
      - punctured neighborhood
      - punctured neighbourhood
      - deleted neighborhood
      - deleted neighbourhood
    description: >
      Local region U_dot obtained from the neighborhood U of c in X by
      removing the center c.

  - id: struct:open-endpoint
    name: OpenEndpoint
    kind: structure
    category: topology
    constructor: '\mathsf{OpenEndpoint}'
    arguments:
      - name: E
        role: endpoint
      - name: x
        role: point
      - name: X
        role: ambient
    carrier_argument: X
    structural_arguments:
      - E
      - x
    surface_forms:
      - open endpoint
      - excluded endpoint
    description: >
      Endpoint object E located at x in the ambient ordered or topological
      space X, with x excluded from the interval determined by E.

  - id: struct:closed-endpoint
    name: ClosedEndpoint
    kind: structure
    category: topology
    constructor: '\mathsf{ClosedEndpoint}'
    arguments:
      - name: E
        role: endpoint
      - name: x
        role: point
      - name: X
        role: ambient
    carrier_argument: X
    structural_arguments:
      - E
      - x
    surface_forms:
      - closed endpoint
      - included endpoint
    description: >
      Endpoint object E located at x in the ambient ordered or topological
      space X, with x included in the interval determined by E.

  - id: struct:unbounded-endpoint
    name: UnboundedEndpoint
    kind: structure
    category: topology
    constructor: '\mathsf{UnboundedEndpoint}'
    arguments:
      - name: E
        role: endpoint
      - name: direction
        role: direction
        surface: '\pm\infty'
      - name: X
        role: ambient
    carrier_argument: X
    structural_arguments:
      - E
      - direction
    surface_forms:
      - unbounded endpoint
      - infinite endpoint
      - endpoint at infinity
    description: >
      Endpoint object E representing an unbounded left or right endpoint in
      the ambient ordered or topological space X. The direction records
      whether the endpoint is toward negative infinity or positive infinity.

  - id: struct:interval
    name: Interval
    kind: structure
    category: topology
    constructor: '\mathsf{Interval}'
    arguments:
      - name: I
        role: interval
      - name: E_left
        role: left_endpoint
      - name: E_right
        role: right_endpoint
      - name: X
        role: ambient
    carrier_argument: X
    structural_arguments:
      - I
      - E_left
      - E_right
    surface_forms:
      - interval
      - interval determined by endpoints
    description: >
      Interval object I in the ambient ordered or topological space X,
      determined by left and right endpoint objects. Endpoint objects record
      whether finite endpoints are included or excluded and whether an
      endpoint is unbounded.

  - id: struct:centered-open-interval
    name: CenteredOpenInterval
    kind: structure
    category: topology
    constructor: '\mathsf{CenteredOpenInterval}'
    arguments:
      - name: I
        role: interval
      - name: c
        role: center
      - name: r
        role: radius
      - name: X
        role: ambient
    carrier_argument: X
    structural_arguments:
      - I
      - c
      - r
    surface_forms:
      - centered open interval
      - symmetric open interval
      - open interval centered at a point
    description: >
      Open interval I centered at c with radius r in the ambient ordered or
      topological space X.

  - id: struct:punctured-centered-open-interval
    name: PuncturedCenteredOpenInterval
    kind: structure
    category: topology
    constructor: '\mathsf{PuncturedCenteredOpenInterval}'
    arguments:
      - name: I_dot
        role: punctured_interval
        surface: 'I^\times'
      - name: I
        role: underlying_interval
      - name: c
        role: center
      - name: r
        role: radius
      - name: X
        role: ambient
    carrier_argument: X
    structural_arguments:
      - I_dot
      - I
      - c
      - r
    surface_forms:
      - punctured centered open interval
      - deleted centered open interval
      - punctured symmetric open interval
      - deleted symmetric open interval
    description: >
      Local interval I_dot obtained from the centered open interval I centered
      at c with radius r in X by removing the center c.

  - id: struct:centered-closed-interval
    name: CenteredClosedInterval
    kind: structure
    category: topology
    constructor: '\mathsf{CenteredClosedInterval}'
    arguments:
      - name: I
        role: interval
      - name: c
        role: center
      - name: r
        role: radius
      - name: X
        role: ambient
    carrier_argument: X
    structural_arguments:
      - I
      - c
      - r
    surface_forms:
      - centered closed interval
      - symmetric closed interval
      - closed interval centered at a point
    description: >
      Closed interval I centered at c with radius r in the ambient ordered or
      topological space X.

  - id: struct:partition
    name: Partition
    kind: structure
    category: integration
    constructor: '\mathsf{Partition}'
    arguments:
      - name: P
        role: partition
      - name: I
        role: interval
    carrier_argument: I
    structural_arguments:
      - P
    surface_forms:
      - partition
      - partition of an interval
    description: >
      Integration structure recording that P is a partition object associated
      with the interval I.

  - id: struct:tagged-partition
    name: TaggedPartition
    kind: structure
    category: integration
    constructor: '\mathsf{TaggedPartition}'
    arguments:
      - name: T
        role: tagged_partition
      - name: P
        role: partition
      - name: I
        role: interval
    carrier_argument: I
    structural_arguments:
      - T
      - P
    surface_forms:
      - tagged partition
      - tagged partition of an interval
    description: >
      Integration structure recording a tagged partition T built from a
      partition P of the interval I.

  - id: struct:gauge
    name: Gauge
    kind: structure
    category: integration
    constructor: '\mathsf{Gauge}'
    arguments:
      - name: delta
        role: gauge
        surface: '\delta'
      - name: I
        role: interval
    carrier_argument: I
    structural_arguments:
      - delta
    surface_forms:
      - gauge
      - gauge on an interval
    description: >
      Integration structure recording a positive radius assignment delta on
      the interval I.

  - id: struct:riemann-criterion
    name: RiemannCriterion
    kind: structure
    category: integration
    constructor: '\mathsf{RiemannCriterion}'
    arguments: []
    carrier_argument: null
    structural_arguments: []
    surface_forms:
      - Riemann criterion
      - Riemann integration criterion
    description: >
      Integration criterion for Riemann definite integrability.

  - id: struct:darboux-criterion
    name: DarbouxCriterion
    kind: structure
    category: integration
    constructor: '\mathsf{DarbouxCriterion}'
    arguments: []
    carrier_argument: null
    structural_arguments: []
    surface_forms:
      - Darboux criterion
      - Darboux integration criterion
    description: >
      Integration criterion for Darboux definite integrability.

  - id: struct:cauchy-criterion
    name: CauchyCriterion
    kind: structure
    category: integration
    constructor: '\mathsf{CauchyCriterion}'
    arguments: []
    carrier_argument: null
    structural_arguments: []
    surface_forms:
      - Cauchy criterion
      - Cauchy integration criterion
    description: >
      Integration criterion for Cauchy-style definite integrability.

  - id: struct:henstock-kurzweil-criterion
    name: HenstockKurzweilCriterion
    kind: structure
    category: integration
    constructor: '\mathsf{HenstockKurzweilCriterion}'
    arguments: []
    carrier_argument: null
    structural_arguments: []
    surface_forms:
      - Henstock-Kurzweil criterion
      - Henstock-Kurzweil integration criterion
    description: >
      Integration criterion for Henstock-Kurzweil definite integrability.

  - id: struct:mcshane-criterion
    name: McShaneCriterion
    kind: structure
    category: integration
    constructor: '\mathsf{McShaneCriterion}'
    arguments: []
    carrier_argument: null
    structural_arguments: []
    surface_forms:
      - McShane criterion
      - McShane integration criterion
    description: >
      Integration criterion for McShane definite integrability.

  - id: struct:riemann-stieltjes-criterion
    name: RiemannStieltjesCriterion
    kind: structure
    category: integration
    constructor: '\mathsf{RiemannStieltjesCriterion}'
    arguments:
      - name: alpha
        role: integrator
        surface: '\alpha'
    carrier_argument: null
    structural_arguments:
      - alpha
    surface_forms:
      - Riemann-Stieltjes criterion
      - Riemann-Stieltjes integration criterion
    description: >
      Integration criterion for Riemann-Stieltjes definite integrability with
      integrator alpha.

  - id: struct:difference-operator
    name: DifferenceOperator
    kind: structure
    category: discrete_calculus
    constructor: '\mathsf{DifferenceOperator}'
    arguments:
      - name: Delta
        role: difference_operator
        surface: '\Delta'
      - name: I
        role: discrete_domain
    carrier_argument: I
    structural_arguments:
      - Delta
    surface_forms:
      - difference operator
      - finite difference operator
    description: >
      Operator structure for taking finite differences of functions or
      sequences on a discrete domain I.

  - id: struct:forward-difference-operator
    name: ForwardDifferenceOperator
    kind: structure
    category: discrete_calculus
    constructor: '\mathsf{ForwardDifferenceOperator}'
    arguments:
      - name: Delta
        role: forward_difference_operator
        surface: '\Delta'
      - name: I
        role: discrete_domain
    carrier_argument: I
    structural_arguments:
      - Delta
    surface_forms:
      - forward difference operator
      - one-step difference operator
    description: >
      Difference operator Delta that sends a discrete function f to the
      one-step forward difference Delta f.

  - id: struct:higher-difference-operator
    name: HigherDifferenceOperator
    kind: structure
    category: discrete_calculus
    constructor: '\mathsf{HigherDifferenceOperator}'
    arguments:
      - name: Delta
        role: difference_operator
        surface: '\Delta'
      - name: k
        role: order
      - name: I
        role: discrete_domain
    carrier_argument: I
    structural_arguments:
      - Delta
      - k
    surface_forms:
      - higher difference operator
      - iterated difference operator
    description: >
      Iterated finite-difference operator Delta raised to order k on the
      discrete domain I.

  - id: struct:shift-operator
    name: ShiftOperator
    kind: structure
