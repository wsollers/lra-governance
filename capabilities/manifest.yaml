version: 2
# Capability manifest consumed by resolve.py. Each capability declares `applies_to`
# (repo kinds). The resolver maps repo -> kind via overlays-config.yaml and only matches
# capabilities applicable to that kind. Triggers matched whole-word, longest-match wins.
# {root}/{chapter}/{canonical}/{target} are substituted by the resolver.
capabilities:
  - id: build-repo
    applies_to: [volume, lean, cpp, library, vault, web, governance]
    triggers: ["dispatch workflow", "dispatch workflows", "monitor workflow", "monitor workflows",
               "github action", "github actions", "build repo", "build repository",
               "validate repo", "validate repository", "check repo", "check repository",
               "run ci", "ci", "build", "validate"]
    reads:
      - capabilities/build-repo/capability.md
      - capabilities/reference-index.md
      - capabilities/build-repo/build_repo.py
    verify:
      - "python capabilities/build-repo/build_repo.py --root {root}"
  - id: audit-semantic-topic
    applies_to: [volume]
    triggers: ["lra audit topic", "audit semantic topic", "topic semantic audit",
               "validate topic artifacts", "audit topic artifacts"]
    reads:
      - capabilities/audit-semantic-topic/capability.md
      - docs/workflows/topic-semantic-audit-loop.md
      - docs/workflows/semantic-artifact-calibration.md
      - docs/architecture/semantic-artifact-record.md
      - constitution/prompts/audit-topic-semantic-artifacts.md
      - constitution/prompts/calibrate-semantic-artifact.md
      - constitution/prompts/validate-semantic-artifact-logic.md
      - constitution/schema/semantic-artifact.schema.json
      - constitution/schema/semantic-artifact-package.schema.json
      - constitution/schema/semantic-artifact-support.schema.json
      - constitution/schema/artifact-audit-validation.schema.json
      - constitution/schema/topic-semantic-audit.schema.json
      - tools/governance/validate_semantic_artifact.py
      - tools/governance/validate_topic_semantic_audit.py
    verify:
      - "python tools/governance/validate_topic_semantic_audit.py {target} --repo-root {root} --governance-root {canonical} --strict"
  - id: calibrate-semantic-artifact
    applies_to: [volume]
    triggers: ["calibrate semantic artifact", "semantic artifact", "review semantic artifact",
               "artifact yaml", "calibrate definition", "calibrate theorem"]
    reads:
      - capabilities/calibrate-semantic-artifact/capability.md
      - docs/workflows/semantic-artifact-calibration.md
      - docs/architecture/semantic-artifact-record.md
      - constitution/prompts/calibrate-semantic-artifact.md
      - constitution/schema/semantic-artifact.schema.json
      - constitution/schema/semantic-artifact-package.schema.json
      - constitution/schema/semantic-artifact-support.schema.json
      - tools/governance/validate_semantic_artifact.py
    verify:
      - "python tools/governance/validate_semantic_artifact.py --artifact {target} --governance-root {canonical} --strict"
  - id: author-statement
    applies_to: [volume]
    triggers: ["author statement", "generate the latex", "append the", "the theorem",
               "the lemma", "the proposition", "the corollary", "the axiom",
               "theorem", "lemma", "proposition", "corollary", "axiom"]
    reads:
      - capabilities/author-statement/capability.md
      - capabilities/reference-index.md
      - capabilities/author-statement/proof_stub.py
    verify:
      - "python tools/governance/validate_decoration.py --root {root} --chapter {chapter} --canonical-dir {canonical}"
      - "python tools/governance/audit_proof_layout.py --root {root} --chapter {chapter} --strict"
      - "cd {root} && python ../lra-governance/scripts/build_volume.py --root ."
  - id: author-definition
    applies_to: [volume]
    triggers: ["author definition", "generate the definition", "the definition",
               "write the def", "define ", "definition"]
    reads:
      - capabilities/author-definition/capability.md
      - capabilities/reference-index.md
      - capabilities/author-definition/verify.py
    verify:
      - "python tools/governance/validate_decoration.py --root {root} --chapter {chapter} --canonical-dir {canonical}"
      - "python capabilities/author-definition/verify.py --target {target} --kind definition --predicates {canonical}/predicates.yaml"
      - "cd {root} && python ../lra-governance/scripts/build_volume.py --root ."
  - id: author-stub-chapter
    applies_to: [volume]
    triggers: ["stub a chapter", "stub chapter", "scaffold a chapter", "scaffold chapter", "new chapter"]
    reads:
      - capabilities/author-stub-chapter/capability.md
      - capabilities/reference-index.md
      - capabilities/author-stub-chapter/stub_chapter.py
    verify:
      - "python tools/governance/validate_volume.py {root} --fail-on-errors"
      - "cd {root} && python ../lra-governance/scripts/build_volume.py --root ."
  - id: author-stub-section
    applies_to: [volume]
    triggers: ["stub a section", "stub section", "scaffold a section", "new section"]
    reads:
      - capabilities/author-stub-section/capability.md
      - capabilities/reference-index.md
      - capabilities/author-stub-section/stub_section.py
    verify:
      - "python tools/governance/validate_volume.py {root} --fail-on-errors"
      - "cd {root} && python ../lra-governance/scripts/build_volume.py --root ."
  - id: author-lean-theorem
    applies_to: [lean]
    triggers: ["formalize", "lean theorem", "add lean", "formalise"]
    reads:
      - capabilities/author-lean-theorem/capability.md
      - capabilities/reference-index.md
    verify:
      - "Run the repo overlay success gates."
  - id: cpp-build-task
    applies_to: [cpp]
    triggers: ["do task", "task", "implement", "build task"]
    reads:
      - capabilities/cpp-build-task/capability.md
      - capabilities/reference-index.md
    verify:
      - "Run the repo overlay success gates."
