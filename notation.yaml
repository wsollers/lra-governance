# Canonical LRA notation registry.
# Governed by docs/governance/notation-standards.md.

notation:
  - id: not:natural-numbers
    symbol: '\mathbb{N}'
    category: number_system
    description: Natural numbers.
  - id: not:real-numbers
    symbol: '\mathbb{R}'
    category: number_system
    description: Real numbers.
  - id: not:carrier
    symbol: '\operatorname{Carrier}'
    category: structural_operator
    description: Carrier set of an ambient mathematical object.
  - id: not:domain
    symbol: '\operatorname{dom}'
    category: function_operator
    description: Domain of a function or relation.
  - id: not:identity-function
    symbol: '\operatorname{id}'
    category: function_operator
    description: Identity function.
  - id: not:at-point-operation
    name: AtPointOperationNotation
    symbol: '\operatorname{AtPointOp}'
    category: function_operator
    description: Notation for applying a real operation to function values at a single input.
  - id: not:interior-operator
    symbol: '\operatorname{int}'
    category: topology_operator
    description: Interior operator on subsets of a topological space.
  - id: not:closure-operator
    name: Closure
    symbol: '\operatorname{Closure}'
    category: topology_operator
    description: Closure operator on subsets of a metric or topological space.
  - id: not:diameter
    name: Diameter
    symbol: '\operatorname{diam}'
    category: metric_operator
    description: Diameter of a subset of a metric space.
  - id: not:distance
    name: Distance
    symbol: '\operatorname{Distance}'
    category: metric_operator
    description: Distance function or distance value in a metric space.
  - id: not:length
    name: Length
    symbol: '\operatorname{Length}'
    category: interval_operator
    description: Length of a bounded interval, determined by its endpoints.
  - id: not:centered-open-interval
    name: CenteredOpenIntervalNotation
    symbol: 'I_r(c)'
    template: 'I_{<radius>}(<center>)'
    category: interval_notation
    description: Notation for the open interval centered at c with radius r.
  - id: not:punctured-centered-open-interval
    name: PuncturedCenteredOpenIntervalNotation
    symbol: 'I^\times_r(c)'
    template: 'I^{\times}_{<radius>}(<center>)'
    category: interval_notation
    description: >
      Notation for the punctured open interval centered at c with radius r.
  - id: not:centered-closed-interval
    name: CenteredClosedIntervalNotation
    symbol: '\overline{I}_r(c)'
    template: '\overline{I}_{<radius>}(<center>)'
    category: interval_notation
    description: Notation for the closed interval centered at c with radius r.
  - id: not:open-ball
    name: OpenBallNotation
    symbol: 'B_r(c)'
    template: 'B_{<radius>}(<center>)'
    category: topology_notation
    description: Notation for the open ball centered at c with radius r.
  - id: not:punctured-open-ball
    name: PuncturedOpenBallNotation
    symbol: 'B^\times_r(c)'
    template: 'B^{\times}_{<radius>}(<center>)'
    category: topology_notation
    description: Notation for the punctured open ball centered at c with radius r.
  - id: not:closed-ball
    name: ClosedBallNotation
    symbol: '\overline{B}_r(c)'
    template: '\overline{B}_{<radius>}(<center>)'
    category: topology_notation
    description: >
      Notation for the closed ball centered at c with radius r. The overline
      marks the closed-ball convention and should not be confused with an
      assertion that the closed ball equals the closure of the corresponding
      open ball in every metric space.
  - id: not:open-ball-closure
    name: OpenBallClosureNotation
    symbol: '\overline{B_r(c)}'
    template: '\overline{B_{<radius>}(<center>)}'
    category: topology_notation
    description: >
      Notation for the topological closure of the open ball B_r(c) in the
      ambient metric or topological space.
  - id: not:punctured-closed-ball
    name: PuncturedClosedBallNotation
    symbol: '\overline{B}^\times_r(c)'
    template: '\overline{B}^{\times}_{<radius>}(<center>)'
    category: topology_notation
    description: >
      Notation for the punctured closed ball centered at c with radius r.
  - id: not:real-part
    symbol: '\operatorname{Re}'
    category: complex_operator
    description: Real part of a complex number.
  - id: not:imaginary-part
    symbol: '\operatorname{Im}'
    category: complex_operator
    description: Imaginary part of a complex number.
  - id: not:sign-function
    symbol: '\operatorname{sgn}'
    category: function_operator
    description: Sign function.
  - id: not:natural-logarithm
    name: NaturalLogarithm
    symbol: '\ln'
    category: elementary_function
    description: Natural logarithm function.
  - id: not:sine
    name: Sine
    symbol: '\sin'
    category: elementary_function
    description: Sine function.
  - id: not:cosine
    name: Cosine
    symbol: '\cos'
    category: elementary_function
    description: Cosine function.
  - id: not:inverse-tangent
    name: Arctangent
    symbol: '\arctan'
    category: elementary_function
    description: Principal inverse tangent function.
  - id: not:hyperbolic-sine
    name: HyperbolicSine
    symbol: '\sinh'
    category: elementary_function
    description: Hyperbolic sine function.
  - id: not:hyperbolic-cosine
    name: HyperbolicCosine
    symbol: '\cosh'
    category: elementary_function
    description: Hyperbolic cosine function.
  - id: not:hyperbolic-tangent
    name: HyperbolicTangent
    symbol: '\tanh'
    category: elementary_function
    description: Hyperbolic tangent function.
  - id: not:limit-superior
    name: LimitSuperior
    symbol: '\limsup'
    category: analysis_operator
    description: Limit superior operator.
  - id: not:limit-inferior
    name: LimitInferior
    symbol: '\liminf'
    category: analysis_operator
    description: Limit inferior operator.
  - id: not:partition-mesh
    name: PartitionMesh
    symbol: '\|P\|'
    category: integration_operator
    description: Mesh, or norm, of a finite partition P.
  - id: not:floor-function
    name: FloorFunction
    symbol: '\lfloor x\rfloor'
    category: arithmetic_operator
    description: Floor, or integer part, of a real number x.
  - id: not:hyperbolic-secant
    symbol: '\operatorname{sech}'
    category: elementary_function
    description: Hyperbolic secant function.
  - id: not:hyperbolic-cosecant
    symbol: '\operatorname{csch}'
    category: elementary_function
    description: Hyperbolic cosecant function.
  - id: not:hyperbolic-cotangent
    symbol: '\operatorname{coth}'
    category: elementary_function
    description: Hyperbolic cotangent function.
  - id: not:inverse-secant
    symbol: '\operatorname{arcsec}'
    category: elementary_function
    description: Principal inverse secant function.
  - id: not:inverse-cosecant
    symbol: '\operatorname{arccsc}'
    category: elementary_function
    description: Principal inverse cosecant function.
  - id: not:inverse-cotangent
    symbol: '\operatorname{arccot}'
    category: elementary_function
    description: Principal inverse cotangent function.
  - id: not:inverse-hyperbolic-sine
    symbol: '\operatorname{arcsinh}'
    category: elementary_function
    description: Inverse hyperbolic sine function.
  - id: not:inverse-hyperbolic-cosine
    symbol: '\operatorname{arccosh}'
    category: elementary_function
    description: Inverse hyperbolic cosine function.
  - id: not:inverse-hyperbolic-tangent
    symbol: '\operatorname{arctanh}'
    category: elementary_function
    description: Inverse hyperbolic tangent function.
  - id: not:inverse-hyperbolic-secant
    symbol: '\operatorname{arcsech}'
    category: elementary_function
    description: Inverse hyperbolic secant function.
  - id: not:inverse-hyperbolic-cosecant
    symbol: '\operatorname{arccsch}'
    category: elementary_function
    description: Inverse hyperbolic cosecant function.
  - id: not:inverse-hyperbolic-cotangent
    symbol: '\operatorname{arccoth}'
    category: elementary_function
    description: Inverse hyperbolic cotangent function.
  - id: not:opposite-side-length
    symbol: '\operatorname{opp}'
    category: geometry_operator
    description: Opposite side length relative to an angle in a right triangle.
  - id: not:adjacent-side-length
    symbol: '\operatorname{adj}'
    category: geometry_operator
    description: Adjacent side length relative to an angle in a right triangle.
  - id: not:hypotenuse-length
    symbol: '\operatorname{hyp}'
    category: geometry_operator
    description: Hypotenuse length in a right triangle.
  - id: not:hyperbolic-area
    symbol: '\operatorname{HArea}'
    category: geometry_operator
    description: Signed hyperbolic sector area determined by geometric input data.
  - id: not:image-operator
    symbol: '\operatorname{im}'
    category: function_operator
    description: Image of a function, or the image-codomain tag in a restricted map.
  - id: not:range-operator
    symbol: '\operatorname{ran}'
    category: relation_operator
    description: Range of a relation.
  - id: not:arity-map
    symbol: '\operatorname{ar}'
    category: logic_operator
    description: Arity map for symbols in a formal signature.
  - id: not:arity-function
    symbol: '\operatorname{arity}'
    category: logic_operator
    description: Arity function for formal-language symbols.
  - id: not:variable-set-operator
    symbol: '\operatorname{Var}'
    category: logic_operator
    description: Variables occurring in a formula or term.
  - id: not:sentence-set-operator
    symbol: '\operatorname{Sent}'
    category: logic_operator
    description: Set of sentences of a formal language.
  - id: not:sentences-set-operator
    symbol: '\operatorname{Sentences}'
    category: logic_operator
    description: Set of sentences of a formal language.
  - id: not:subformula-set-operator
    symbol: '\operatorname{Sub}'
    category: logic_operator
    description: Set of subformulas of a formula.
  - id: not:formula-depth-operator
    symbol: '\operatorname{depth}'
    category: logic_operator
    description: Depth of a formula.
  - id: not:connective-count-operator
    symbol: '\operatorname{conn}'
    category: logic_operator
    description: Connective count of a formula.
  - id: not:consequence-closure-operator
    symbol: '\operatorname{Cn}'
    category: logic_operator
    description: Deductive consequence closure of a set of sentences.
  - id: not:theory-of-structure-operator
    symbol: '\operatorname{Th}'
    category: logic_operator
    description: Theory of a structure.
  - id: not:consistency-operator
    symbol: '\operatorname{Con}'
    category: logic_operator
    description: Consistency assertion or operator for a theory.
  - id: not:relative-consistency-operator
    symbol: '\operatorname{RelCon}'
    category: logic_operator
    description: Relative consistency assertion or operator for two theories.
  - id: not:homomorphism-operator
    symbol: '\operatorname{Hom}'
    category: logic_operator
    description: Homomorphism notation between formal or algebraic structures.
  - id: not:evaluation-operator
    symbol: '\operatorname{eval}'
    category: logic_operator
    description: Evaluation map for terms, formulas, or assignments.
  - id: not:successor-operator
    symbol: '\operatorname{succ}'
    category: logic_operator
    description: Successor operation in a formal model or example structure.
  - id: not:term-set-operator
    symbol: '\operatorname{Terms}'
    category: logic_operator
    description: Set of terms of a formal language or signature.
  - id: not:well-formed-formula-set-operator
    symbol: '\operatorname{WFF}'
    category: logic_operator
    description: Set of well-formed formulas of a formal language or signature.
  - id: not:canonical-disjunctive-normal-form
    symbol: '\operatorname{CDNF}'
    category: logic_operator
    description: Canonical disjunctive normal form operator.
  - id: not:canonical-conjunctive-normal-form
    symbol: '\operatorname{CCNF}'
    category: logic_operator
    description: Canonical conjunctive normal form operator.
  - id: not:for-all
    symbol: '\forall'
    category: quantifier
    description: Universal quantifier.
  - id: not:there-exists
    symbol: '\exists'
    category: quantifier
    description: Existential quantifier.
  - id: not:if-and-only-if
    symbol: '\Longleftrightarrow'
    category: connective
    description: Biconditional connective.
  - id: not:implies
    symbol: '\Rightarrow'
    category: connective
    description: Implication connective.
  - id: not:domain-operator-uppercase
    symbol: '\operatorname{Dom}'
    category: operator_notation
    description: Domain notation for a partial operation or relation.
  - id: not:image-operator
    symbol: '\operatorname{Image}'
    category: operator_notation
    description: Operator notation for Image.
  - id: not:pow-operator
    symbol: '\operatorname{pow}'
    category: operator_notation
    description: Operator notation for pow.
  - id: not:pre-operator
    symbol: '\operatorname{Pre}'
    category: operator_notation
    description: >
      Pre-carrier notation for the raw set used before quotienting in a
      construction, such as \operatorname{Pre}\mathbb{Z},
      \operatorname{Pre}\mathbb{Q}, or \operatorname{Pre}\mathbb{C}. This is
      set-valued/operator notation, not a predicate.
  - id: not:preq-operator
    symbol: '\operatorname{PreQ}'
    category: operator_notation
    description: Operator notation for PreQ.
  - id: not:diagonal-matrix-operator
    name: DiagonalMatrixOperator
    symbol: '\operatorname{diag}'
    category: linear_algebra_operator
    description: Diagonal matrix formed from the listed diagonal entries.
  - id: not:linear-span-operator
    name: LinearSpanOperator
    symbol: '\operatorname{span}'
    category: linear_algebra_operator
    description: Linear span of a family of vectors.
  - id: not:ieee-bit-width
    name: IEEEBitWidth
    symbol: '\operatorname{BitWidth}'
    category: numerical_analysis_operator
    description: Total bit width accessor for an IEEE binary format.
  - id: not:ieee-sign-width
    name: IEEESignWidth
    symbol: '\operatorname{SignWidth}'
    category: numerical_analysis_operator
    description: Sign-field width accessor for an IEEE binary format.
  - id: not:ieee-exponent-width
    name: IEEEExponentWidth
    symbol: '\operatorname{ExponentWidth}'
    category: numerical_analysis_operator
    description: Exponent-field width accessor for an IEEE binary format.
  - id: not:ieee-fraction-width
    name: IEEEFractionWidth
    symbol: '\operatorname{FractionWidth}'
    category: numerical_analysis_operator
    description: Fraction-field width accessor for an IEEE binary format.
  - id: not:ieee-exponent-bias
    name: IEEEExponentBias
    symbol: '\operatorname{ExponentBias}'
    category: numerical_analysis_operator
    description: Exponent-bias accessor for an IEEE binary format.
  - id: not:ieee-sign-field
    name: IEEESignField
    symbol: '\operatorname{SignField}'
    category: numerical_analysis_operator
    description: Sign-field accessor for an IEEE binary datum.
  - id: not:ieee-exponent-field
    name: IEEEExponentField
    symbol: '\operatorname{ExponentField}'
    category: numerical_analysis_operator
    description: Exponent-field accessor for an IEEE binary datum.
  - id: not:ieee-fraction-field
    name: IEEEFractionField
    symbol: '\operatorname{FractionField}'
    category: numerical_analysis_operator
    description: Fraction-field accessor for an IEEE binary datum.
