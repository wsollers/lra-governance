# =============================================================
# sync-governance.yml
# Disabled: governance is no longer synced one-way into other LRA repos.
#
# NOTE: This workflow no longer generates per-leaf sync-to-monorepo.yml
# files. Leaf -> monorepo syncing was inverted to a single mono-side
# orchestrator (Learning-Real-Analysis/.github/workflows/assemble-from-leaves.yml),
# so the old fan-in template is intentionally not emitted here anymore.
# =============================================================

name: Governance sync disabled

on:
  workflow_dispatch:

jobs:
  disabled:
    runs-on: ubuntu-latest
    steps:
      - name: Explain disabled sync
        run: |
          echo "Governance fan-out sync is disabled."
          echo "Leaf repos must use lra-governance directly via LRA_GOVERNANCE_ROOT, ../lra-governance, F:/repos/lra-governance, or the build Docker image."
