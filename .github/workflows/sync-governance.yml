# =============================================================
# sync-governance.yml
# Syncs governance files and rule docs one-way into all LRA repos.
#
# Required secret:
#   SYNC_PAT: GitHub PAT with repo scope for the target repositories.
# =============================================================

name: Sync governance files

on:
  push:
    branches: [main]
    paths:
      - 'DESIGN.md'
      - 'REPOSITORY_STRUCTURE.md'
      - '.gitignore'
      - 'constitution/**'
      - 'docs/**'
      - 'scripts/**'
      - 'tools/**'
      - '.github/workflows/sync-governance.yml'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        repo:
          - Learning-Real-Analysis
          - lra-common
          - lra-volume-i
          - lra-volume-ii
          - lra-volume-iii
          - lra-volume-iv
          - lra-volume-v
          - lra-volume-vi
          - lra-volume-vii
          - lra-volume-viii
          - lra-source-profiles

    steps:
      - name: Checkout governance source
        uses: actions/checkout@v4
        with:
          path: governance

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: wsollers/${{ matrix.repo }}
          token: ${{ secrets.SYNC_PAT }}
          path: target

      - name: Sync governance files
        run: |
          rsync -av --delete governance/constitution/ target/constitution/
          rsync -av --delete governance/docs/ target/docs/
          cp governance/.gitignore target/.gitignore
          cp governance/DESIGN.md target/DESIGN.md
          cp governance/REPOSITORY_STRUCTURE.md target/REPOSITORY_STRUCTURE.md
          if [[ "${{ matrix.repo }}" == lra-volume-* ]]; then
            rsync -av --delete governance/tools/ target/tools/
            rsync -av --delete governance/scripts/ target/scripts/
            repo="${{ matrix.repo }}"
            volume="${repo#lra-volume-}"
            expr='$'
            case "$volume" in
              i) bib="volume-i-foundations.bib" ;;
              ii) bib="volume-ii-number-systems.bib" ;;
              iii) bib="volume-iii-analysis.bib" ;;
              iv) bib="volume-iv-algebra.bib" ;;
              v) bib="volume-v-topology-geometry.bib" ;;
              vi) bib="volume-vi-computational.bib" ;;
              vii) bib="volume-vii-numerical-approximation.bib" ;;
              viii) bib="volume-viii-logic-foundations.bib" ;;
              *) echo "Unknown volume suffix: $volume" >&2; exit 1 ;;
            esac
            mkdir -p target/.github/workflows
            cat > target/.github/workflows/sync-to-monorepo.yml <<EOF
name: Sync volume-$volume to monorepo

on:
  push:
    branches: [main]
    paths:
      - 'volume-$volume/**'
      - 'bibliography/$bib'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout lra-volume-$volume
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          repository: wsollers/Learning-Real-Analysis
          token: ${expr}{{ secrets.SYNC_PAT }}
          path: monorepo

      - name: Validate volume bibliography
        run: |
          cd source
          python scripts/check_bibliography.py --bib-dir bibliography

      - name: Validate volume
        run: |
          cd source
          python scripts/build_volume.py --validate-only

      - name: Sync volume-$volume/ into monorepo
        run: |
          rsync -av --delete source/volume-$volume/ monorepo/volume-$volume/

      - name: Sync volume-$volume bibliography into monorepo
        run: |
          mkdir -p monorepo/bibliography
          cp source/bibliography/$bib monorepo/bibliography/$bib

      - name: Commit and push if changed
        run: |
          cd monorepo
          git config user.name  "lra-sync-bot"
          git config user.email "sync-bot@noreply.github.com"
          git add volume-$volume/ bibliography/$bib
          git diff --cached --quiet && echo "No changes to sync" && exit 0
          git commit -m "chore: sync volume-$volume from lra-volume-$volume"
          git push
            EOF
          fi

      - name: Commit and push if changed
        run: |
          cd target
          git config user.name  "lra-governance-bot"
          git config user.email "governance-bot@noreply.github.com"
          git add .gitignore DESIGN.md REPOSITORY_STRUCTURE.md constitution/ docs/
          if [[ "${{ matrix.repo }}" == lra-volume-* ]]; then
            git add tools/ scripts/ .github/workflows/sync-to-monorepo.yml
          fi
          git diff --cached --quiet && echo "No governance changes for ${{ matrix.repo }}" && exit 0
          git commit -m "chore: sync governance files"
          git push
