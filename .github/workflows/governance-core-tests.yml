name: Governance Core Tests

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  governance-core-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout governance
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validator dependencies
        run: python -m pip install --upgrade pyyaml jsonschema

      - name: Compile changed governance tools
        run: |
          python -m py_compile \
            capabilities/resolve.py \
            tools/governance/validate_semantic_artifact.py \
            tools/governance/validate_topic_semantic_audit.py

      - name: Validate JSON Schemas
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from jsonschema import Draft202012Validator

          paths = [
              Path("constitution/schema/semantic-artifact.schema.json"),
              Path("constitution/schema/semantic-artifact-package.schema.json"),
              Path("constitution/schema/semantic-artifact-support.schema.json"),
              Path("constitution/schema/artifact-audit-validation.schema.json"),
              Path("constitution/schema/topic-semantic-audit.schema.json"),
          ]
          for path in paths:
              Draft202012Validator.check_schema(json.loads(path.read_text(encoding="utf-8")))
              print(f"validated {path}")
          PY

      - name: Test capability routing
        run: python capabilities/test_resolve.py

      - name: Test semantic artifact validators
        run: |
          python -m unittest \
            tools/governance/test_validate_semantic_artifact.py \
            tools/governance/test_validate_topic_semantic_audit.py
